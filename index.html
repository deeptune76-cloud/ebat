<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🌏 알파벳 마스터</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Noto+Sans+JP&family=Noto+Sans+SC&family=Noto+Sans+Devanagari&family=Noto+Sans+Bengali&family=Noto+Sans+Tamil&display=swap');
:root{
  --bg:#0a0a14;--bg2:#111122;--card:#161630;--card2:#1e1e40;
  --border:#2a2a5a;--accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;--accent4:#f9a825;
  --text:#e8e8ff;--text2:#9999cc;--text3:#5555aa;--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.app-header{background:linear-gradient(135deg,#1a1a3e,#0d0d20);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100;}
.app-title{font-size:18px;font-weight:900;background:linear-gradient(90deg,#6c63ff,#ff6584,#43e97b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.app-subtitle{font-size:11px;color:var(--text3);margin-top:2px;}
.lang-scroll{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;}
.lang-scroll::-webkit-scrollbar{display:none;}
.lang-scroll::after{content:'›';position:absolute;right:0;top:0;bottom:0;width:28px;background:linear-gradient(to right,transparent,var(--bg2));display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;pointer-events:none;}
.lang-btn{flex-shrink:0;padding:6px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;}
.lang-btn.active{border-color:var(--accent);background:linear-gradient(135deg,#2a2060,#1a1040);color:#fff;box-shadow:0 0 12px rgba(108,99,255,.4);}
.main{padding:16px;padding-bottom:320px;}
.section-intro{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.section-intro h2{font-size:16px;font-weight:700;margin-bottom:6px;}
.section-intro p{font-size:12px;color:var(--text2);line-height:1.6;}
.tip-box{background:rgba(108,99,255,.08);border-left:3px solid var(--accent);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.8;}
.group-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin:16px 0 8px;padding-left:4px;}
.alpha-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px;}
.alpha-grid.g4{grid-template-columns:repeat(4,1fr);}
.char-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 6px 8px;text-align:center;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;user-select:none;}
.char-card:active{transform:scale(.93);}
.char-card.selected{border-color:var(--accent);background:linear-gradient(135deg,#2a2060,#1a1040);box-shadow:0 0 16px rgba(108,99,255,.35);}
.char-card.mastered{border-color:var(--accent3);background:linear-gradient(135deg,#0f2a1a,#0a1810);}
.char-main{font-size:24px;line-height:1.2;margin-bottom:2px;display:block;}
.char-ko{font-size:11px;color:var(--accent3);font-weight:700;display:block;margin-bottom:1px;letter-spacing:-.3px;}
.char-rom{font-size:9px;color:var(--text3);display:block;}
.char-meaning{font-size:8px;color:var(--accent2);display:block;margin-top:1px;}
.mastered-badge{position:absolute;top:3px;right:3px;font-size:8px;color:var(--accent3);}
.practice-panel{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(10,10,20,0) 0%,var(--bg) 12%);padding:0 16px 16px;z-index:50;}
.practice-card{background:linear-gradient(135deg,#1a1a40,#111128);border:1.5px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 -8px 40px rgba(0,0,0,.6);}
.practice-empty{text-align:center;color:var(--text3);font-size:13px;padding:8px 0;}
.practice-char{text-align:center;margin-bottom:10px;}
.big{font-size:52px;line-height:1;}
.rom-big{font-size:16px;color:var(--text2);margin-top:3px;}
.meaning-big{font-size:12px;color:var(--accent2);margin-top:2px;}
.tip-text{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5;}
.tts-notice{font-size:11px;color:var(--accent4);background:rgba(249,168,37,.1);border:1px solid rgba(249,168,37,.3);border-radius:8px;padding:6px 10px;margin-bottom:8px;text-align:center;display:none;}
.repeat-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.repeat-label{font-size:12px;color:var(--text2);white-space:nowrap;}
.repeat-dots{display:flex;gap:3px;flex-wrap:wrap;flex:1;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s;}
.dot.done{background:var(--accent3);}.dot.current{background:var(--accent);}
.repeat-count{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;}
.btn-row{display:flex;gap:8px;}
.btn{flex:1;padding:11px 8px;border-radius:12px;border:none;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn:active{transform:scale(.95);}
.btn-listen{background:linear-gradient(135deg,#3a2f8a,#5a45cc);color:#fff;}
.btn-speak{background:linear-gradient(135deg,#7b2d6e,#cc4499);color:#fff;}
.btn-speak.recording{background:linear-gradient(135deg,#cc2244,#ff4466);animation:pulse .8s infinite;}
.btn-next{background:linear-gradient(135deg,#1a5a2a,#2a9a44);color:#fff;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.progress-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.progress-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:3px;transition:width .4s;}
.progress-text{font-size:11px;color:var(--text2);white-space:nowrap;}
.feedback-msg{text-align:center;font-size:12px;margin-top:6px;min-height:16px;color:var(--accent3);}
.feedback-msg.error{color:var(--accent2);}
.speak-hint{font-size:10px;color:var(--text3);text-align:center;margin-top:5px;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(108,99,255,.95);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px;text-align:center;}
.modal-box h3{font-size:20px;margin-bottom:10px;}
.modal-box p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;}
.modal-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#a070ff);color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.strategy-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.strategy-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;transition:all .2s;}
.strategy-item:active{transform:scale(.97);}
.s-icon{font-size:22px;margin-bottom:6px;}
.s-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.s-desc{font-size:11px;color:var(--text2);line-height:1.6;white-space:pre-line;}
/* ===== 한자 탭 ===== */
.kanji-search-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px;}
.kanji-search-row{display:flex;gap:8px;margin-bottom:0;}
.kanji-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:22px;font-family:'Noto Sans SC',sans-serif;outline:none;}
.kanji-input:focus{border-color:var(--accent);}
.kanji-input::placeholder{font-size:13px;color:var(--text3);}
.kanji-search-btn{padding:10px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#a070ff);color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.kanji-ai-btn{padding:10px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,#b05020,#ff7030);color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.kanji-result{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;display:none;}
.kanji-char-big{font-size:80px;text-align:center;line-height:1.1;font-family:'Noto Sans SC',sans-serif;cursor:pointer;}
.kanji-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.ki{background:var(--card);border-radius:8px;padding:8px 10px;}
.ki-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.ki-val{font-size:13px;font-weight:700;color:var(--text);}
.kanji-components{background:var(--card);border-radius:8px;padding:10px;margin-top:8px;}
.kanji-components-title{font-size:10px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.comp-chip{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;display:inline-block;margin:2px;}
.ai-analysis{background:linear-gradient(135deg,rgba(108,99,255,.06),rgba(255,101,132,.04));border:1px solid rgba(108,99,255,.25);border-radius:12px;padding:14px;margin-top:10px;display:none;}
.ai-analysis-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;}
.ai-analysis-body{font-size:12px;color:var(--text2);line-height:1.9;white-space:pre-wrap;}
.ai-loading{text-align:center;color:var(--text3);font-size:12px;padding:12px;}
.kanji-grid-title{font-size:13px;font-weight:700;color:var(--text2);margin:16px 0 8px;}
.kanji-big-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.kanji-mini{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;transition:all .15s;}
.kanji-mini:active{transform:scale(.9);}
.km-char{font-size:22px;font-family:'Noto Sans SC',sans-serif;display:block;line-height:1.2;}
.km-r{font-size:8px;color:var(--text3);display:block;}
.km-m{font-size:8px;color:var(--accent2);display:block;}
.api-key-notice{background:rgba(249,168,37,.07);border:1px solid rgba(249,168,37,.25);border-radius:10px;padding:12px;margin-bottom:12px;font-size:11px;color:var(--accent4);line-height:1.7;}
.api-key-row{display:flex;gap:6px;margin-top:8px;}
.api-key-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;}
.api-key-save{padding:7px 12px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;}


/* ===== 발음 트레이너 탭 ===== */
.pt-wrap{padding:12px 14px;max-width:600px;margin:0 auto;}
.pt-progress-track{display:flex;gap:4px;margin-bottom:16px;}
.pt-step{flex:1;height:4px;border-radius:2px;background:var(--border);transition:all .3s;}
.pt-step.done{background:var(--accent3);}
.pt-step.active{background:var(--accent);animation:pulse .8s infinite;}
.pt-step.fail{background:var(--accent2);}
.pt-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;text-align:center;}
.pt-word{font-size:32px;font-weight:900;color:var(--text);letter-spacing:-1px;}
.pt-ipa{font-size:14px;color:var(--accent3);margin:4px 0;font-family:monospace;}
.pt-meaning{font-size:13px;color:var(--text2);margin-bottom:6px;}
.pt-sentence{font-size:12px;color:var(--text3);background:var(--bg2);border-radius:8px;padding:8px 12px;line-height:1.8;text-align:left;margin-top:8px;}
.pt-sentence b{color:var(--accent);}
.pt-score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.pt-score-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.pt-score-label{font-size:9px;color:var(--text3);margin-bottom:4px;letter-spacing:.5px;}
.pt-score-val{font-size:22px;font-weight:900;}
.pt-score-grade{font-size:10px;margin-top:2px;}
.pt-bar{height:6px;border-radius:3px;background:var(--border);margin:4px 0;overflow:hidden;}
.pt-bar-fill{height:100%;border-radius:3px;transition:width .6s;}
.pt-correction{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px;text-align:left;font-size:12px;line-height:1.9;}
.pt-correction-item{margin:3px 0;}
.pt-correction-item .bad{color:var(--accent2);text-decoration:line-through;}
.pt-correction-item .good{color:var(--accent3);font-weight:700;}
.pt-shadowing{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.3);border-radius:10px;padding:12px;}
.pt-shadow-word{display:inline-block;padding:2px 6px;border-radius:6px;margin:2px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;}
.pt-shadow-word.current{background:var(--accent);color:#fff;transform:scale(1.1);}
.pt-shadow-word.done{background:var(--accent3);color:#fff;}
.pt-shadow-word.pending{background:var(--border);color:var(--text2);}
.pt-btn-row{display:flex;gap:8px;margin-top:10px;}
.pt-btn{flex:1;padding:12px 8px;border-radius:10px;border:none;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;}
.pt-btn-listen{background:linear-gradient(135deg,#3a2f8a,#5a45cc);color:#fff;}
.pt-btn-record{background:linear-gradient(135deg,#7b2d6e,#cc4499);color:#fff;}
.pt-btn-record.recording{animation:pulse .6s infinite;background:linear-gradient(135deg,#cc2244,#ff4466);}
.pt-btn-next{background:linear-gradient(135deg,#065f46,#10b981);color:#fff;}
.pt-btn-skip{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}
.pt-level-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pt-level-label{font-size:11px;color:var(--text3);white-space:nowrap;}
.pt-level-btn{padding:4px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;}
.pt-level-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}
.pt-intonation-line{position:relative;height:40px;background:var(--bg2);border-radius:8px;margin:6px 0;overflow:hidden;}
.pt-intonation-svg{width:100%;height:40px;}
.pt-review-list{max-height:200px;overflow-y:auto;}
.pt-review-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;}
.pt-review-item:last-child{border:none;}

/* ===== 알파벳 탭 발음 이력 패널 ===== */
.speak-history{margin:4px 14px 0;border-radius:10px;overflow:hidden;max-height:0;transition:max-height .4s;}
.speak-history.open{max-height:400px;}
.sh-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px 10px 0 0;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;}
.sh-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:8px 10px;max-height:250px;overflow-y:auto;}
.sh-item{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);font-size:10px;}
.sh-item:last-child{border-bottom:none;}
.sh-round{color:var(--text3);width:24px;flex-shrink:0;}
.sh-grade{width:16px;text-align:center;}
.sh-said{flex:1;color:var(--text2);}
.sh-score{color:var(--text3);width:32px;text-align:right;}
.sh-tip{padding:6px 8px;background:rgba(108,99,255,.08);border-radius:6px;font-size:10px;color:var(--accent);line-height:1.7;margin-top:4px;}
.speak-mode-bar{display:flex;align-items:center;gap:4px;padding:4px 14px 2px;}
.speak-mode-label{font-size:10px;color:var(--text3);}
.smode-btn{padding:3px 9px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;}
.smode-btn.active{border-color:var(--accent2);background:var(--accent2);color:#fff;}
/* ===== 주파수 시각화 ===== */
.freq-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin:8px 0;display:none;}
.freq-panel.active{display:block;}
.freq-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.freq-label{font-size:10px;color:var(--text3);width:52px;flex-shrink:0;}
.freq-canvas-wrap{flex:1;position:relative;height:48px;background:rgba(0,0,0,.25);border-radius:6px;overflow:hidden;}
canvas.freq-canvas{width:100%;height:48px;display:block;}
.freq-score{font-size:10px;font-weight:700;min-width:36px;text-align:right;}
.freq-note{font-size:9px;color:var(--text3);text-align:center;margin-top:4px;}
.freq-compare-bar{height:3px;border-radius:2px;margin-top:3px;transition:width .3s;}
/* 이어폰 품질 뱃지 */
.audio-quality{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-top:6px;}
.aq-good{background:rgba(16,185,129,.15);color:var(--accent3);}
.aq-ok{background:rgba(249,168,37,.15);color:var(--accent4);}
.aq-bad{background:rgba(239,68,68,.15);color:var(--accent2);}
/* ===== 반복 듣기/말하기 패널 ===== */
.repeat-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg2);border-top:1px solid var(--border);}
.repeat-label{font-size:10px;color:var(--text3);white-space:nowrap;}
.repeat-count-btn{padding:4px 9px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.repeat-count-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}
.repeat-listen-btn{flex:1;padding:7px 4px;border-radius:8px;border:none;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;background:linear-gradient(135deg,#3a2f8a,#5a45cc);color:#fff;display:flex;align-items:center;justify-content:center;gap:3px;}
.repeat-listen-btn.playing{background:linear-gradient(135deg,#cc2244,#ff4466);animation:pulse .8s infinite;}
.repeat-speak-btn{flex:1;padding:7px 4px;border-radius:8px;border:none;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;background:linear-gradient(135deg,#7b2d6e,#cc4499);color:#fff;display:flex;align-items:center;justify-content:center;gap:3px;}
.repeat-speak-btn.recording{background:linear-gradient(135deg,#cc2244,#ff4466);animation:pulse .8s infinite;}
.repeat-progress{font-size:10px;color:var(--accent3);min-width:36px;text-align:center;font-weight:700;}
.speak-feedback{padding:0 14px;font-size:11px;line-height:1.8;border-radius:0 0 12px 12px;max-height:0;overflow:hidden;transition:all .3s;}
.speak-feedback.show{max-height:300px;padding:10px 14px;}
.sfb-good{background:rgba(16,185,129,.12);color:var(--accent3);border-top:2px solid var(--accent3);}
.sfb-ok{background:rgba(249,168,37,.1);color:var(--accent4);border-top:2px solid var(--accent4);}
.sfb-bad{background:rgba(239,68,68,.1);color:var(--accent2);border-top:2px solid var(--accent2);}
.pron-grade{font-size:18px;font-weight:900;display:inline-block;margin-right:6px;}
.pron-grade.상{color:var(--accent3);}
.pron-grade.중{color:var(--accent4);}
.pron-grade.하{color:var(--accent2);}
.pron-detail{margin-top:6px;padding:6px 8px;background:rgba(0,0,0,.15);border-radius:6px;font-size:10px;line-height:1.8;}
.pron-bar-wrap{display:flex;align-items:center;gap:6px;margin:4px 0;}
.pron-bar-label{font-size:9px;color:var(--text3);width:50px;flex-shrink:0;}
.pron-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.pron-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
/* 알파벳 탭 반복 선택 */
.repeat-select-wrap{display:flex;align-items:center;gap:4px;padding:6px 14px 2px;}
.repeat-select-label{font-size:10px;color:var(--text3);}
.rep-btn{padding:3px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;}
.rep-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}
/* ===== 단어장 탭 (전면 개편) ===== */
.word-search-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.word-search-row{display:flex;gap:8px;}
.word-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:20px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.word-input:focus{border-color:var(--accent);}
.word-input::placeholder{font-size:13px;color:var(--text3);}
.word-search-btn{padding:12px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#a070ff);color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.word-history{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.word-hist-chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;}
.word-hist-chip:active{transform:scale(.95);}
/* 언어 카드 */
.wlang-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;}
.wlang-header{display:flex;align-items:center;gap:8px;padding:12px 14px 0;}
.wlang-flag{font-size:22px;}
.wlang-name{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;}
.wlang-word{font-size:32px;font-weight:900;color:var(--text);padding:4px 14px 0;line-height:1.2;}
.wlang-word.cjk{font-family:'Noto Sans SC','Noto Sans JP',sans-serif;}
.wlang-rom{font-size:13px;color:var(--accent);padding:2px 14px;}
.wlang-meaning{font-size:12px;color:var(--text2);padding:2px 14px 10px;}
.wlang-word-btns{display:flex;gap:6px;padding:0 14px 10px;}
.wlang-btn{padding:7px 0;border-radius:8px;border:none;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:4px;}
.wlang-btn-listen{background:linear-gradient(135deg,#3a2f8a,#5a45cc);color:#fff;}
.wlang-btn-speak{background:linear-gradient(135deg,#7b2d6e,#cc4499);color:#fff;}
.wlang-btn-speak.recording{background:linear-gradient(135deg,#cc2244,#ff4466);animation:pulse .8s infinite;}
/* 한자 분석 */
.kanji-analysis{background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;}
.kanji-char-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.kanji-char-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;min-width:120px;flex:1;}
.kcb-char{font-size:36px;font-family:'Noto Sans SC',sans-serif;display:block;text-align:center;line-height:1.1;}
.kcb-readings{font-size:10px;color:var(--text3);text-align:center;margin:3px 0;}
.kcb-meaning{font-size:11px;color:var(--accent2);text-align:center;font-weight:700;}
.kcb-struct{font-size:10px;color:var(--text2);text-align:center;margin-top:4px;line-height:1.5;}
.kcb-story{font-size:10px;color:var(--accent3);text-align:center;margin-top:2px;font-style:italic;}
/* 예문 */
.wlang-sentences{border-top:1px solid var(--border);}
.wlang-sentence{padding:10px 14px;border-bottom:1px solid rgba(42,42,90,.5);}
.wlang-sentence:last-child{border-bottom:none;}
.ws-label{font-size:9px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:4px;}
.ws-text{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:2px;}
.ws-text.cjk{font-family:'Noto Sans SC','Noto Sans JP',sans-serif;}
.ws-rom{font-size:10px;color:var(--accent);margin-bottom:1px;}
.ws-meaning{font-size:11px;color:var(--text3);margin-bottom:6px;}
.ws-btns{display:flex;gap:6px;}
.ws-btn{flex:1;padding:7px 4px;border-radius:8px;border:none;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;}
.ws-btn-listen{background:linear-gradient(135deg,#3a2f8a,#5a45cc);color:#fff;}
.ws-btn-speak{background:linear-gradient(135deg,#7b2d6e,#cc4499);color:#fff;}
.ws-btn-speak.recording{background:linear-gradient(135deg,#cc2244,#ff4466);animation:pulse .8s infinite;}
/* 로딩 */
.word-loading{text-align:center;padding:40px 20px;color:var(--text3);}
.word-loading-spinner{font-size:36px;animation:spin 1s linear infinite;display:block;margin-bottom:12px;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* 점수 피드백 */
.ws-score-good{color:var(--accent3)!important;}
.ws-score-ok{color:var(--accent4)!important;}
.ws-score-bad{color:var(--accent2)!important;}

</style>
</head>
<body>
<div class="app-header">
  <div class="app-title">🌏 알파벳 마스터</div>
  <div class="app-subtitle">11개 탭 · 듣기·말하기·30회 반복 · 한자 AI 분석</div>
</div>

      <div class="tts-notice" id="ttsNotice"></div>

        <div class="tip-text" id="pTip"></div>

        <div class="repeat-dots" id="repeatDots"></div>
        <span class="repeat-count" id="repeatCount">0/30</span>
      </div>
      <!-- 반복 횟수 선택 -->
      <div class="repeat-select-wrap">
        <span class="repeat-select-label">목표:</span>
        <button class="rep-btn active" data-rep="30" onclick="setRepeatTarget(30)">30회</button>
        <button class="rep-btn" data-rep="50" onclick="setRepeatTarget(50)">50회</button>
        <button class="rep-btn" data-rep="80" onclick="setRepeatTarget(80)">80회</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-listen" id="listenBtn">🔊 듣기</button>
        <button class="btn btn-speak" id="speakBtn">🎤 말하기</button>
        <button class="btn btn-next" id="nextBtn">✓ 완료</button>
      </div>
      <div class="feedback-msg" id="feedbackMsg"></div>
      <!-- 상중하 평가 결과 -->
      <div id="alphaSpeakFeedback" style="margin:4px 14px 0;border-radius:10px;overflow:hidden;"></div>
      <div class="speak-mode-bar">
        <span class="speak-mode-label">말하기:</span>
        <button class="smode-btn active" id="smodeOnce" onclick="setSpeakMode('once')">1회</button>
        <button class="smode-btn" id="smodeRepeat" onclick="setSpeakMode('repeat')">연속</button>
      </div>
      <div class="speak-hint" id="speakHintTxt">말하기 버튼 → 발음 인식 → 상중하 평가</div>
      <!-- 발음 트레이너 연동 버튼 -->
      <div style="padding:6px 14px 2px">
        <button id="alphaPtBtn"
          onclick="alphaQuickTrain()"
          style="width:100%;padding:8px;border-radius:8px;border:none;background:linear-gradient(135deg,#065f46,#10b981);color:#fff;font-size:11px;font-weight:700;cursor:pointer;display:none">
          🎯 발음 트레이너로 집중 훈련
        </button>
      </div>
      <!-- 발음 이력 패널 -->
      <div class="speak-history" id="speakHistory">
        <div class="sh-header" onclick="document.getElementById('speakHistory').classList.toggle('open')">
          📊 발음 이력 <span id="shSummary" style="font-weight:400;color:var(--text3)">말하기 후 기록됩니다</span>
          <span style="color:var(--text3);font-size:10px">▼</span>
        </div>
        <div class="sh-body" id="shBody"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">🎉</h3>
    <p id="modalText"></p>
    <button class="modal-btn" id="modalBtn">계속 학습하기</button>
  </div>
</div>

const DATA={
en:{

  tip:'파닉스 5대 규칙\n① 모음+e: 앞 모음을 길게 (make→메이크, time→타임)\n② 이중모음: ee/ea=이, oo=우, ai/ay=에이, oa=오우\n③ 묵음: k(know), w(write), b(climb), gh(night)\n④ c+e/i/y=[s]: cell,city,cycle\n⑤ 어말 e: 묵음이지만 앞 모음을 길게',
  groups:[

      {c:'O',r:'오우 [oʊ]',t:'알파벳명: oh [oʊ]\n단모음[ɒ/ɔ] vs 장모음[oʊ]\n예: odd(오드) dog(도그) — 단음\n     open(오픈) home(홈) — 장음'},
      {c:'U',r:'유 [juː]',t:'알파벳명: you [juː]\n단모음[ʌ] vs 장모음[juː]\n예: up(업) cup(컵) — 단음\n     use(유즈) cube(큐브) — 장음'},

    {label:'자음 B~H',chars:[

      {c:'C',r:'시 [siː]',t:'알파벳명: see [siː]\ne·i·y 앞→[s]: city(시티), cycle(사이클)\n그 외→[k]: cat(캣), cup(컵)\n⚠ ch=[tʃ]: chair(체어), cheese(치즈)'},
      {c:'D',r:'디 [diː]',t:'알파벳명: dee [diː] — [d] 유성 치조\n예: dog(도그), day(데이), door(도어)'},

cn:{
  title:'🇨🇳 중국어 병음 (汉语拼音)',
  intro:'한어병음 = 성모(자음) 21개 + 운모(모음) 36개 + 성조 4개. 중국어 발음의 완전한 표기 체계!',
  tip:'4대 핵심\n① 성조: 같은 발음도 높낮이에 따라 뜻이 완전히 다름 (mā妈/má麻/mǎ马/mà骂)\n② zh/ch/sh vs z/c/s: 혀를 말아올리면 zh/ch/sh, 평평하면 z/c/s\n③ j/q/x: 혀끝을 아래 앞니에 대고 발음\n④ ü: 입술 동그랗게 하고 "이" 발음',
  groups:[
    {label:'성모(声母) — 순음 b p m f',chars:[
      {c:'b',r:'으 (bō)',t:'무성 무기음 [p]\n숨 안 나오는 "브"\n예: bā(바)=8, bàba(바바)=아빠',speakText:'bā'},
      {c:'p',r:'프 (pō)',t:'무성 유기음 [pʰ]\n숨 확 나오는 "프"\n예: pá(파)=기어오르다, péngyou(펑유)=친구',speakText:'pō'},
      {c:'m',r:'므 (mō)',t:'양순 비음 [m]\n예: māma(마마)=엄마, mén(먼)=문',speakText:'māma'},
      {c:'f',r:'프 (fō)',t:'순치 마찰음 [f]\n예: fēijī(페이지)=비행기, fàn(판)=밥',speakText:'fēijī'},
    ]},
    {label:'성모 — 설첨음 d t n l',chars:[
      {c:'d',r:'드 (dē)',t:'무성 무기 치조음 [t]\n예: dà(다)=크다, dōngxi(동시)=물건',speakText:'dà'},
      {c:'t',r:'트 (tē)',t:'무성 유기 치조음 [tʰ]\n예: tā(타)=그/그녀, tiān(티엔)=날씨/하늘',speakText:'tiān'},
      {c:'n',r:'느 (nē)',t:'치조 비음 [n]\n예: nǐ(니)=너, nǎ(나)=어느',speakText:'nǐ hǎo'},
      {c:'l',r:'르 (lē)',t:'설측음 [l]\n예: lái(라이)=오다, lǎoshī(라오스)=선생님',speakText:'lái'},
    ]},
    {label:'성모 — 설근음 g k h',chars:[
      {c:'g',r:'그 (gē)',t:'무성 무기 연구개음 [k]\n예: gè(거)=개(양사), guó(궈)=나라',speakText:'guó'},
      {c:'k',r:'크 (kē)',t:'무성 유기 연구개음 [kʰ]\n예: kāfēi(카페이)=커피, kàn(칸)=보다',speakText:'kāfēi'},
      {c:'h',r:'흐 (hē)',t:'성문 마찰음 [x]\n목에서 나는 "흐"\n예: hǎo(하오)=좋다, hé(허)=강',speakText:'hǎo'},

      {c:'q',r:'치 (qī)',t:'무성 유기 경구개음 [tɕʰ]\n예: qù(취)=가다, qǐng(칭)=부탁합니다',speakText:'qǐng'},

fr:{
  title:'🇫🇷 프랑스어 알파벳',
  intro:'기본 26자 + 악센트/합자 14개 + 핵심 발음 규칙. 묵음·비음·연음이 3대 핵심!',
  tip:'3대 규칙\n① 묵음: 어말 자음 대부분 안 읽음 (Paris=파리, beaux=보)\n② 비음: an/en=앙, in/ain/ein=앵, on=옹, un=엥\n③ 연음(liaison): 단어 끝 자음 + 모음 시작 → 연결해서 읽음\n  예: les amis → 레자미 (s를 연음)',
  groups:[
    {label:'기본 알파벳 A~M (13자)',chars:[
      {c:'A',r:'아 [a]',t:'알파벳명: a [a]\n예: ami(아미)=친구, avoir(아봐르)=가지다'},
      {c:'B',r:'베 [be]',t:'알파벳명: be [be]\n예: bonjour(봉주르)=안녕, blanc(블랑)=하얀'},
      {c:'C',r:'세 [se]',t:'알파벳명: ce [se]\n발음규칙: e·i·y 앞→[s], 그 외→[k]\n예: café(카페), ciel(시엘)=하늘'},
      {c:'D',r:'데 [de]',t:'알파벳명: de [de]\n어말 d는 묵음\n예: dans(당)=안에, grand(그랑)=크다'},
      {c:'E',r:'으 [ə]',t:'알파벳명: e [ə] (슈와)\n악센트 없으면 약하게 발음하거나 묵음\n예: le(르)=정관사, me(므)=나를'},
      {c:'F',r:'에프 [ef]',t:'알파벳명: effe [ef]\n예: femme(팜)=여자 ※m이지 f가 아님\nfin(펭)=끝'},
      {c:'G',r:'쥬에 [ʒe]',t:'알파벳명: ge [ʒe]\ne·i·y 앞→[ʒ](쥬), 그 외→[g](그)\n예: garçon(가르송), genou(쥬누)=무릎'},
      {c:'H',r:'아슈 [aʃ]',t:'알파벳명: ache [aʃ]\n무음h(h muet): 연음 가능 — les hommes(레좀)\n유기음h(h aspiré): 연음 불가 — les haricots(레 아리코)\n예: heure(외르)=시간, homme(옴)=남자'},
      {c:'I',r:'이 [i]',t:'알파벳명: i [i]\n예: ici(이시)=여기, île(일)=섬'},
      {c:'J',r:'쥐 [ʒi]',t:'알파벳명: ji [ʒi]\n항상 [ʒ] — 영어 j와 전혀 다름!\n예: je(쥬)=나, jour(주르)=날'},
      {c:'K',r:'카 [ka]',t:'알파벳명: ka [ka]\n외래어·고유명사에만 사용\n예: kilo(킬로), kayak(카약)'},
      {c:'L',r:'엘 [el]',t:'알파벳명: elle [el]\n예: livre(리브르)=책, lune(륀)=달'},
      {c:'M',r:'엠 [em]',t:'알파벳명: emme [em]\n예: merci(메르시)=감사, mère(메르)=어머니'},
    ]},
    {label:'기본 알파벳 N~Z (13자)',chars:[
      {c:'N',r:'엔 [en]',t:'알파벳명: enne [en]\n예: non(농)=아니오, nuit(뉘)=밤'},
      {c:'O',r:'오 [o]',t:'알파벳명: o [o]\n닫힌o[o] vs 열린o[ɔ] 구분\n예: mot(모)=단어, or(오르)=금'},
      {c:'P',r:'페 [pe]',t:'알파벳명: pe [pe]\n어말 p는 묵음\n예: Paris(파리), trop(트로)=너무'},
      {c:'Q',r:'뀌 [ky]',t:'알파벳명: cu [ky]\n거의 항상 qu=k 발음, u는 묵음\n예: qui(키)=누가, que(크)=~것'},
      {c:'R',r:'에르 [er]',t:'알파벳명: erre [er]\n목구멍 굴림소리 [ʁ] — 한국어에 없는 발음!\n혀뿌리를 목구멍 쪽으로 올려 진동\n예: rue(뤼)=길, rouge(루쥬)=빨강'},
      {c:'S',r:'에스 [es]',t:'알파벳명: esse [es]\n단어 시작·자음 옆→[s], 모음 사이→[z]\n어말 s는 묵음 (연음 시는 발음)\n예: sac(삭)=가방, rose(로즈)=장미'},
      {c:'T',r:'테 [te]',t:'알파벳명: te [te]\n어말 t는 묵음\n-tion/-sion → [sjɔ̃](시옹)\n예: tu(튀)=너, nation(나시옹)=나라'},
      {c:'U',r:'위 [y]',t:'알파벳명: u [y]\n입술을 앞으로 내밀며 [이] 발음 → [y]\n영어 u와 전혀 다름!\n예: une(윈)=하나, lune(륀)=달'},
      {c:'V',r:'베 [ve]',t:'알파벳명: ve [ve]\n영어 v와 동일 (윗니+아랫입술)\n예: vous(부)=당신, vert(베르)=초록'},
      {c:'W',r:'두블르베 [dubləve]',t:'알파벳명: double-vé [dubləve]\n외래어에서 v 또는 w 발음\n예: wifi(위피), week-end(위켄드)'},
      {c:'X',r:'익스 [iks]',t:'알파벳명: ixe [iks]\n[ks] 또는 [gz] 또는 묵음(어말)\n예: exact(에그작트), deux(되)=2(묵음)'},
      {c:'Y',r:'이그렉 [iɡʁek]',t:'알파벳명: i grec [iɡʁek]\n모음처럼 [i] 또는 반모음 [j]\n예: yeux(이외)=눈, yoga(요가)'},
      {c:'Z',r:'제드 [zed]',t:'알파벳명: zède [zed]\n어말 z는 대부분 묵음\n예: zéro(제로)=0, nez(네)=코(묵음)'},
    ]},
    {label:'악센트 기호 (Accent) 12개',chars:[
      {c:'é',r:'에 fermé [e]',t:'에꾸 accent aigu\n닫힌 e [e] — 입 작게 벌려 에\n예: été(에떼)=여름, café(카페)'},
      {c:'è',r:'에 ouvert [ɛ]',t:'에그라브 accent grave\n열린 e [ɛ] — 입 더 벌려 에\n예: père(페르)=아버지, après(아프레)=후에'},
      {c:'ê',r:'에 long [ɛː]',t:'에시르콩플렉스 accent circonflexe\n열린 e, 원래는 장음 표시\n예: fête(페트)=축제, être(에트르)=~이다'},
      {c:'ë',r:'에 séparé [e]',t:'에트레마 tréma\n앞 모음과 분리해서 발음\n예: Noël(노엘)=크리스마스, Noëlle(이름)'},
      {c:'à',r:'아 [a]',t:'아그라브 — 발음은 a와 동일\n주로 전치사 à(~에/~를)로만 사용\n예: à Paris(아 파리)=파리에서'},
      {c:'â',r:'아 long [ɑ]',t:'아시르콩플렉스 — 후설 장음 a [ɑ]\n예: château(샤토)=성, âge(아쥬)=나이'},
      {c:'î',r:'이 [i]',t:'이시르콩플렉스 — 발음은 i와 동일\n어원 표시용\n예: île(일)=섬, naître(네트르)=태어나다'},
      {c:'ï',r:'이 séparé [i]',t:'이트레마 — 앞 모음과 분리\n예: naïf(나이프)=순진한, Noël 관련 이름들'},
      {c:'ô',r:'오 [o]',t:'오시르콩플렉스 — 닫힌 장음 o\n예: hôtel(오텔)=호텔, côte(코트)=해안'},
      {c:'ù',r:'위 [y]',t:'위그라브 — 발음은 u와 동일\n전치사 ou(또는)와 부사 où(어디)를 구분\n예: où(우)=어디, ou(우)=또는'},
      {c:'û',r:'위 long [yː]',t:'위시르콩플렉스 — u의 어원 표시\n예: sûr(쒸르)=확실한, dû(뒤)=~해야 했다'},
      {c:'ç',r:'스 [s]',t:'세디유 cédille — a·o·u 앞에서 s 발음\nc 아래 꼬리 → s\n예: français(프랑세), garçon(가르송)'},
    ]},
    {label:'합자·특수문자 2개',chars:[
      {c:'œ',r:'외 [œ]',t:'오에 합자 (o+e 결합)\n입술 앞으로 내밀며 에 → [œ]\n예: cœur(쾨르)=마음, sœur(쇠르)=자매\nœuf(외프)=달걀'},
      {c:'æ',r:'에 [e/ɛ]',t:'아에 합자 (a+e 결합)\n라틴어 유래 단어에만\n예: æqual(에쾔), 현대 프랑스어서 희귀'},
    ]},
    {label:'모음 조합 발음',chars:[
      {c:'au',r:'오 [o]',t:'au = 오\n예: aussi(오시)=도, fausse(포스)=가짜'},
      {c:'eau',r:'오 [o]',t:'eau = 오 (au와 동일 발음)\n예: beau(보)=아름다운, eau(오)=물\nchateau(샤토)=성'},
      {c:'ou',r:'우 [u]',t:'ou = 우 (영어 oo)\n예: vous(부)=당신, jour(주르)=날'},

hi:{
  title:'🇮🇳 힌디어 (देवनागरी)',
  intro:'데바나가리 문자 = 모음(스바르) 13자 + 자음(브얀잔) 36자 + 결합자음 3자. 과학적 구강 위치별 배열이 핵심!',
  tip:'4대 핵심 개념\n① 무기음 vs 기음(유기음): 숨이 안 나옴 vs 나옴 — 카/카(h)\n② 무성 vs 유성: 성대 안 울림 vs 울림 — 카/가\n③ 치음 vs 권설음: 혀끝이 이 뒤 vs 입천장 위로 말아\n④ 마트라(모음부호): 자음에 붙어 모음 소리 변경 — ка→कि(키)',
  groups:[
    {label:'모음 (स्वर) — 13자',chars:[
      {c:'अ',r:'아/으 [ə]',t:'아/으 — 슈와 발음 [ə]\n한국어 "아"와 "으" 사이\n예: अब(아브)=지금, अच्छा(아차)=좋아'},
      {c:'आ',r:'아 [aː]',t:'아 — 장모음 [aː]\n입 크게 벌려 길게\n예: आम(암)=망고, आप(압)=당신'},
      {c:'इ',r:'이 [ɪ]',t:'이 — 단모음 [ɪ]\n예: इधर(이다르)=이쪽, इस(이스)=이것의'},
      {c:'ई',r:'이ː [iː]',t:'이 — 장모음 [iː]\n예: ईमान(이만)=신뢰, ईश्वर(이슈와르)=신'},
      {c:'उ',r:'우 [ʊ]',t:'우 — 단모음 [ʊ]\n예: उठ(우타)=일어나다, उस(우스)=그것의'},
      {c:'ऊ',r:'우ː [uː]',t:'우 — 장모음 [uː]\n예: ऊपर(우파르)=위에, ऊन(운)=울'},
      {c:'ऋ',r:'리 [ɾɪ]',t:'리 — 모음 r [ɾɪ]\n혀를 살짝 굴려 리\n주로 산스크리트 유래 단어\n예: ऋषि(리시)=성자, ऋण(린)=빚'},
      {c:'ए',r:'에 [eː]',t:'에 — 장모음 [eː]\n예: एक(에크)=하나, एड़ी(에리)=발뒤꿈치'},
      {c:'ऐ',r:'애 [ɛː]',t:'애 — 열린 장모음 [ɛː]\n실제 발음은 "아이"보다 "애"에 가까움\n예: ऐसा(에사)=이렇게, ऐनक(에나크)=안경'},
      {c:'ओ',r:'오 [oː]',t:'오 — 장모음 [oː]\n예: ओर(오르)=쪽/방향, ओस(오스)=이슬'},
      {c:'औ',r:'오 [ɔː]',t:'오 — 열린 장모음 [ɔː]\n실제 발음은 "아우"보다 "오"에 가까움\n예: और(오르)=그리고, औरत(오랏)=여자'},
      {c:'अं',r:'앙 [ə̃]',t:'아누스와라 anusvara (ं)\n모음 위 점 → 비음화\n뒤 자음에 따라 n/m/ng 비음\n예: हाँ(항)=네, अंदर(안다르)=안에'},
      {c:'अः',r:'아흐 [əh]',t:'비사르가 visarga (ः)\n모음 뒤 두 점 → h 발음\n주로 산스크리트 유래\n예: नमः(나마흐)=절, दुःख(두흐크)=슬픔'},
    ]},
    {label:'마트라 (모음 부호) — 자음에 붙는 모음',chars:[

      {c:'ि',r:'이 [ɪ]',t:'이(단) 마트라 — 자음 왼쪽\n예: क+ि=कि(키), ब+ि=बि(비)'},
      {c:'ी',r:'이ː [iː]',t:'이(장) 마트라 — 자음 오른쪽\n예: क+ी=की(키ː), ब+ी=बी(비ː)'},
      {c:'ु',r:'우 [ʊ]',t:'우(단) 마트라 — 자음 아래\n예: क+ु=कु(쿠), ब+ु=बु(부)'},
      {c:'ू',r:'우ː [uː]',t:'우(장) 마트라 — 자음 아래\n예: क+ू=कू(쿠ː), ब+ू=बू(부ː)'},
      {c:'े',r:'에 [eː]',t:'에 마트라 — 자음 위+오른쪽\n예: क+े=के(케), ब+े=बे(베)'},
      {c:'ै',r:'애 [ɛː]',t:'애 마트라\n예: क+ै=कै(캐), ब+ै=बै(배)'},
      {c:'ो',r:'오 [oː]',t:'오 마트라\n예: क+ो=को(코), ब+ो=बो(보)'},

      {c:'ृ',r:'리 [ɾɪ]',t:'리 마트라\n예: क+ृ=कृ(크리)'},

    {label:'자음 — 연구개음 (목구멍)',chars:[

      {c:'ख',r:'카(기음) [kʰ]',t:'카(기음) — 무성 유기음 [kʰ]\n숨 확 나옴 (촛불 꺼질 정도)\n예: खाना(카나)=음식, खुश(쿠시)=기쁜'},
      {c:'ग',r:'가 [g]',t:'가 — 유성 무기음 [g]\n성대 울림, 숨 안 나옴\n예: घर(가르)=집... गाना(가나)=노래'},
      {c:'घ',r:'가(유성기음) [gʱ]',t:'가(유성기음) — 유성 유기음 [gʱ]\n성대 울리며 숨도 나옴\n예: घर(가르)=집, घड़ी(가리)=시계'},
      {c:'ङ',r:'응 [ŋ]',t:'응 — 연구개 비음 [ŋ]\n독립 사용 거의 없음\nक/ग/घ 앞 비음으로만 나타남\n예: अंग(앙그)에서 ং처럼'},
    ]},
    {label:'자음 — 경구개음',chars:[
      {c:'च',r:'차 [tʃ]',t:'차 — 무성 무기음 [tʃ]\n예: चाय(차이)=차(茶), चलो(찰로)=가자'},

      {c:'ज',r:'자 [dʒ]',t:'자 — 유성 무기음 [dʒ]\n예: जल(잘)=물, जाना(자나)=가다'},
      {c:'झ',r:'자(유성기음) [dʒʱ]',t:'자(유성기음) — 유성 유기음 [dʒʱ]\n예: झरना(자르나)=폭포, झूठ(주트)=거짓말'},
      {c:'ञ',r:'냐 [ɲ]',t:'냐 — 경구개 비음 [ɲ]\n현대 힌디어에서 거의 न[n]으로 발음\nच/ज 앞 비음\n예: ञान(냔)→지식(주로 ज्ञान으로 씀)'},

    {label:'자음 — 권설음 (혀 말아올림)',chars:[

      {c:'ठ',r:'따(기음) [ʈʰ]',t:'따(기음) — 무성 유기 권설음 [ʈʰ]\n예: ठंड(탄드)=추위, ठीक(틱)=맞아/괜찮아'},

      {c:'ढ',r:'다(유성기음) [ɖʱ]',t:'다(유성기음) — 유성 유기 권설음 [ɖʱ]\n예: ढाका(다카)=다카, ढोल(돌)=북'},

      {c:'ध',r:'다(유성기음) [d̪ʱ]',t:'다(유성기음) — 유성 유기 치음 [d̪ʱ]\n예: धन्यवाद(단야바드)=감사합니다'},
      {c:'न',r:'나 [n]',t:'나 — 치음 비음 [n]\n예: नाम(남)=이름, नहीं(나힌)=아니오'},
    ]},

      {c:'प',r:'파 [p]',t:'파 — 무성 무기 양순음 [p]\n예: पानी(파니)=물, पर(파르)=위에/하지만'},

    {label:'자음 — 반모음',chars:[

ta:{
  title:'🇮🇳 타밀어 (தமிழ்)',
  intro:'세계에서 가장 오래된 고전어 중 하나. 모음 12자 + 자음 18자 + 특수문자 1자 = 247개 조합 글자. 타밀어만의 고유 발음 ழ[ɻ]이 유명합니다!',
  tip:'타밀어 핵심 규칙\n① 자음 위치 변이: 같은 자음이 어두/중간/어말에서 소리가 달라짐\n   예: க 어두[k] → 모음사이[g/ɣ] → 비음뒤[g]\n② 6쌍 구분: 무성/유성(기음 없음!) — 타밀어는 유기음 없음\n③ ழ[ɻ] — 세계 어느 언어에도 없는 타밀 고유 음!\n④ 247자 = 18자음 × 12모음 + 18자음 단독 + 특수문자',
  groups:[
    {label:'모음 (உயிரெழுத்து) — 12자',chars:[
      {c:'அ',r:'a [a]',t:'아 — 단모음 [a]\n예: அம்மா(암마)=엄마, அது(아투)=그것',speakText:'அ'},
      {c:'ஆ',r:'aa [aː]',t:'아 — 장모음 [aː]\n단모음의 2배 길이로 발음\n예: ஆறு(아루)=6/강, ஆம்(암)=예',speakText:'ஆ'},
      {c:'இ',r:'i [i]',t:'이 — 단모음 [i]\n예: இது(이투)=이것, இல்லை(일라이)=없다',speakText:'இ'},
      {c:'ஈ',r:'ii [iː]',t:'이 — 장모음 [iː]\n예: ஈரம்(이람)=습기, ஈர்க்கும்(이르쿰)',speakText:'ஈ'},
      {c:'உ',r:'u [u]',t:'우 — 단모음 [u]\n예: உள்ளே(울레)=안에, உணவு(우나부)=음식',speakText:'உ'},
      {c:'ஊ',r:'uu [uː]',t:'우 — 장모음 [uː]\n예: ஊர்(우르)=마을/도시',speakText:'ஊ'},
      {c:'எ',r:'e [e]',t:'에 — 단모음 [e] 또는 [ɛ]\n예: எது(에투)=무엇, என்(엔)=나의/무엇',speakText:'எ'},
      {c:'ஏ',r:'ee [eː]',t:'에 — 장모음 [eː]\n예: ஏன்(엔)=왜, ஏழு(에루)=7',speakText:'ஏ'},
      {c:'ஐ',r:'ai [ai]',t:'아이 — 이중모음 [ai]\n예: ஐந்து(아인투)=5, ஐயோ(아이요)=아이고',speakText:'ஐ'},
      {c:'ஒ',r:'o [o]',t:'오 — 단모음 [o]\n예: ஒன்று(온루)=1, ஒரு(오루)=하나의',speakText:'ஒ'},
      {c:'ஓ',r:'oo [oː]',t:'오 — 장모음 [oː]\n예: ஓடு(오두)=달리다, ஓய்வு(오이부)=휴식',speakText:'ஓ'},
      {c:'ஔ',r:'au [au]',t:'아우 — 이중모음 [au]\n예: ஔஷதம்(아우샤담)=약(산스크리트 유래)',speakText:'ஔ'},
    ]},
    {label:'특수문자 ஆய்தம்',chars:[
      {c:'ஃ',r:'ah [ʔ/h]',t:'아이탐 ஆய்த எழுத்து\n타밀어 고유 특수문자 — [h] 또는 성문폐쇄음 [ʔ]\n모음 사이 또는 어말에만 등장\n예: எஃகு(에ʔ쿠)=쇠/강철\n현대에서는 주로 영어 외래어 표기용',speakText:'ஃ'},
    ]},
    {label:'모음기호 (உயிர்மெய்) — 자음에 붙는 모음',chars:[
      {c:'ா',r:'aa [aː]',t:'아 마트라 — 자음 오른쪽\n예: க+ா=கா(카), ப+ா=பா(파)',speakText:'ஆ'},
      {c:'ி',r:'i [i]',t:'이(단) 마트라 — 자음 오른쪽 위\n예: க+ி=கி(키), ப+ி=பி(피)',speakText:'இ'},
      {c:'ீ',r:'ii [iː]',t:'이(장) 마트라\n예: க+ீ=கீ(키ː)',speakText:'ஈ'},
      {c:'ு',r:'u [u]',t:'우(단) 마트라 — 자음 아래 오른쪽\n예: க+ு=கு(쿠)',speakText:'உ'},
      {c:'ூ',r:'uu [uː]',t:'우(장) 마트라\n예: க+ூ=கூ(쿠ː)',speakText:'ஊ'},
      {c:'ெ',r:'e [e]',t:'에(단) 마트라 — 자음 앞 붙음\n예: க+ெ=கெ(케)',speakText:'எ'},
      {c:'ே',r:'ee [eː]',t:'에(장) 마트라\n예: க+ே=கே(케ː)',speakText:'ஏ'},
      {c:'ை',r:'ai [ai]',t:'아이 마트라\n예: க+ை=கை(카이)',speakText:'ஐ'},
      {c:'ொ',r:'o [o]',t:'오(단) 마트라 (ெ+ா)\n예: க+ொ=கொ(코)',speakText:'ஒ'},
      {c:'ோ',r:'oo [oː]',t:'오(장) 마트라\n예: க+ோ=கோ(코ː)',speakText:'ஓ'},
      {c:'ௌ',r:'au [au]',t:'아우 마트라\n예: க+ௌ=கௌ(카우)',speakText:'ஔ'},
      {c:'்',r:'(pulli)',t:'புள்ளி 풀리 — 모음 제거 부호\n자음 위에 점 → 모음 অ 없애고 순수 자음\n예: க்+ஷ=க்ஷ 결합자음',speakText:'க்'},
    ]},
    {label:'자음 (மெய்யெழுத்து) — 18자 [위치별 발음 변이]',chars:[
      {c:'க',r:'k/g/x [k~g~ɣ]',t:'카/가/ㅎ — 위치 변이!\n어두: [k] 카\n모음 사이: [g] 또는 [ɣ] 가/으\n비음 뒤: [g] 가\n예: கடல்(카달)=바다, நக்கி(낙기)=핥다',speakText:'க'},
      {c:'ங',r:'nga [ŋ]',t:'응 — 연구개 비음 [ŋ]\nக 앞에서 비음\n예: மங்கல்(망칼)=상서로운',speakText:'ங'},
      {c:'ச',r:'ch/s [tʃ~s]',t:'차/사 — 위치 변이!\n어두: [tʃ] 차\n모음 사이: [s] 또는 [ɕ] 사\n비음 뒤: [dʒ] 자\n예: சாப்பிடு(차피두)=먹다, சொல்(솔)=말',speakText:'ச'},
      {c:'ஞ',r:'nya [ɲ]',t:'냐 — 경구개 비음 [ɲ]\nச 앞에서 비음\n예: ஞாயிறு(냐이루)=일요일/태양',speakText:'ஞ'},
      {c:'ட',r:'ta/da [ʈ~ɖ]',t:'따/다 — 권설음 위치 변이!\n어두: [ʈ] 따\n모음 사이: [ɖ] 다\n비음 뒤: [ɖ] 다\n예: டீ(티)=차(茶), சாட்டை(차타이)=채찍',speakText:'ட'},
      {c:'ண',r:'ṇa [ɳ]',t:'나 — 권설 비음 [ɳ]\nட 앞에서 비음\n예: பண்ணை(판나이)=농장',speakText:'ண'},

let currentLang='jp',selectedChar=null,repeatCount=0,masteredChars={},recognition=null,isRecording=false,apiKey='';
try{masteredChars=JSON.parse(localStorage.getItem('mc')||'{}');}catch(e){}
try{apiKey=localStorage.getItem('apiKey')||'';}catch(e){}

const charIndex={};
for(const lid in DATA){
  charIndex[lid]=[];
  DATA[lid].groups.forEach((g,gi)=>{if(!g.chars)return;g.chars.forEach((ch,ci)=>charIndex[lid].push({gi,ci,char:ch}));});
}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('listenBtn').addEventListener('click',speakChar);
  document.getElementById('speakBtn').addEventListener('click',toggleSpeak);
  document.getElementById('nextBtn').addEventListener('click',countRepeat);
  document.getElementById('modalBtn').addEventListener('click',closeModal);
  window.speechSynthesis.getVoices();
  renderLangSelector();
  renderContent(currentLang);
});

function renderLangSelector(){
  const el=document.getElementById('langScroll');
  el.innerHTML=LANGS.map(l=>'<button class="lang-btn'+(l.id===currentLang?' active':'')+'" data-id="'+l.id+'">'+l.flag+' '+l.name+'</button>').join('');
  el.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>switchLang(btn.dataset.id)));
  // 활성 탭을 보이도록 자동 스크롤
  const activeBtn = el.querySelector('.lang-btn.active');
  if(activeBtn) setTimeout(()=>activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}),50);
}
function switchLang(id){
  currentLang=id;selectedChar=null;repeatCount=0;
  stopRecognition();window.speechSynthesis.cancel();
  renderLangSelector();
  if(id==='kanji'){document.getElementById('practicePanel').style.display='none';renderKanjiTab();}
  else if(id==='word'){document.getElementById('practicePanel').style.display='none';renderWordTab();}
  else if(id==='pt'){document.getElementById('practicePanel').style.display='none';renderPronTrainer();}
  else if(id==='tip'){document.getElementById('practicePanel').style.display='none';renderContent(id);}
  else{document.getElementById('practicePanel').style.display='block';hidePractice();renderContent(id);}
}
function renderContent(id){
  const d=DATA[id];if(!d)return;
  const main=document.getElementById('mainContent');
  const total=(charIndex[id]||[]).length;
  const done=countMastered(id);
  const pct=total>0?Math.round(done/total*100):0;
  let html='<div class="progress-bar-wrap"><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><span class="progress-text">마스터 '+done+'/'+total+' ('+pct+'%)</span></div>'+
    '<div class="section-intro"><h2>'+esc(d.title)+'</h2><p>'+esc(d.intro)+'</p></div>'+
    '<div class="tip-box">'+esc(d.tip).replace(/\n/g,'<br>')+'</div>';
  d.groups.forEach((g,gi)=>{
    html+='<div class="group-label">'+esc(g.label)+'</div>';
    if(g.isStrategy){
      html+='<div class="strategy-grid">';
      g.strategies.forEach((s,si)=>{
        const sid='strat_'+gi+'_'+si;
        html+='<div class="strategy-item" id="'+sid+'" style="cursor:pointer" onclick="toggleStrategyCard(\''+sid+'\')">';
        html+='<div class="s-icon">'+s.icon+'</div>';
        html+='<div class="s-title">'+esc(s.title)+' <span style="float:right;color:var(--text3);font-size:10px">탭하여 보기</span></div>';
        html+='<div class="s-desc" id="'+sid+'_desc" style="display:none">'+esc(s.desc).replace(/\\n/g,'<br>')+'</div>';
        html+='</div>';
      });
      html+='</div>';
    }else{
      const cols=g.chars.length<=6?' g4':'';
      html+='<div class="alpha-grid'+cols+'">';
      g.chars.forEach((ch,ci)=>{
        const key=id+':'+gi+':'+ci;
        const isMastered=!!masteredChars[key];
        const isSel=selectedChar&&selectedChar.lang===id&&selectedChar.gi===gi&&selectedChar.ci===ci;
        // 한글 발음 추출: r 필드 우선, 없으면 t 첫 줄에서
        const rFull=ch.r||'';
        const tFirst=(ch.t||'').split('\n')[0].split('\\n')[0];
        // r에서 한글 추출
        const koInR=rFull.match(/^([가-힣\/]+)/);
        // t 첫줄에서 한글 추출 (앞부분 한글 단어/음절)
        const koInT=tFirst.match(/^([가-힣\/]+)/);
        const koRead=koInR?koInR[1]:(koInT?koInT[1]:'');
        // 로마자 부분 (IPA 제외)
        const romPart=rFull.replace(/[가-힣\/]+\s*/,'').replace(/\s*\[.*?\]/g,'').trim();
        html+='<div class="char-card'+(isMastered?' mastered':'')+(isSel?' selected':'')+'" data-gi="'+gi+'" data-ci="'+ci+'">';
        if(isMastered)html+='<span class="mastered-badge">✓</span>';
        html+='<span class="char-main">'+esc(ch.c)+'</span>';
        if(koRead) html+='<span class="char-ko">'+esc(koRead)+'</span>';
        html+='<span class="char-rom">'+esc(romPart||rFull)+'</span>';
        if(ch.m)html+='<span class="char-meaning">'+esc(ch.m)+'</span>';
        html+='</div>';
      });
      html+='</div>';
    }
  });
  main.innerHTML=html;
  main.querySelectorAll('.char-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const gi=parseInt(card.dataset.gi),ci=parseInt(card.dataset.ci);
      const ch=DATA[currentLang].groups[gi].chars[ci];
      if(ch)selectChar(currentLang,gi,ci,ch);
    });
  });
}
function countMastered(id){return Object.keys(masteredChars).filter(k=>k.startsWith(id+':')&&masteredChars[k]).length;}

function searchKanji(){
  const v=document.getElementById('kanjiInput').value.trim();
  if(!v){showToast('한자를 입력하세요');return;}
  const found=KANJI_DB.find(k=>k.c===v);
  if(found){
    showKanjiResult(found);
    setTimeout(()=>speakTextDirect(found.c,'zh-CN',0.65,found.py),300);
  } else {
    const re=document.getElementById('kanjiResult');
    re.style.display='block';
    re.innerHTML='<div class="kanji-char-big">'+v+'</div><div style="text-align:center;color:var(--text3);font-size:12px;margin-top:10px;">DB에 없는 한자입니다.<br>🤖 AI 분석 버튼으로 Claude에게 물어보세요!</div>';
    document.getElementById('aiAnalysis').style.display='none';
  }
}

async function unihanAnalyze() {
  const v = document.getElementById('kanjiInput').value.trim();
  if (!v) { showToast('먼저 한자를 입력하세요'); return; }

  const aiEl = document.getElementById('aiAnalysis');
  const bodyEl = document.getElementById('aiBody');
  aiEl.style.display = 'block';
  bodyEl.innerHTML = '<div class="ai-loading">🔍 분석 중...</div>';

  // 내장 DB 기본 정보
  const dbInfo = KANJI_DB.find(k => k.c === v);
  const extInfo = KANJI_EXT[v];

  // Unicode 코드포인트
  const cp = v.codePointAt(0);
  const cpHex = cp.toString(16).toUpperCase().padStart(4,'0');

  // Unihan DB API (unicode.org) — 무료, CORS 허용
  let uniData = null;
  try {
    const resp = await fetch(`https://www.unicode.org/cgi-bin/GetUnihanData.pl?codepoint=${cpHex}&useutf8=true`, {signal: AbortSignal.timeout(5000)});
    if (resp.ok) {
      const text = await resp.text();
      uniData = text;
    }
  } catch(e) { /* 타임아웃 또는 CORS — 내장 DB로 대체 */ }

  // 결과 조합
  let result = `━━━━━━━━━━━━━━━━━━━━━━━
🔤 한자: ${v}   Unicode: U+${cpHex}
━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  // 기본 정보 (내장 DB)
  if (dbInfo) {
    result += `📌 기본 정보\n`;
    result += `  중국어 발음(병음): ${dbInfo.py}\n`;
    result += `  한국어 음: ${dbInfo.ko}\n`;
    result += `  일본어 음독: ${dbInfo.on}\n`;
    result += `  일본어 훈독: ${dbInfo.kun}\n`;
    result += `  뜻: ${dbInfo.m}\n\n`;
    result += `🧩 구성 요소\n  ${dbInfo.comp}\n\n`;
    result += `📖 암기 스토리\n  ${dbInfo.story}\n\n`;
  } else {
    result += `📌 Unicode 정보\n`;
    result += `  코드포인트: U+${cpHex}\n`;
    const name = getUnicodeName(cp);
    if (name) result += `  Unicode명: ${name}\n`;
    result += `\n`;
  }

  // 확장 DB 정보
  if (extInfo) {
    result += `━━━━━━━━━━━━━━━━━━━━━━━\n`;
    result += `📊 상세 분석\n`;
    if (extInfo.radical) {
      const rname = RADICALS[extInfo.radical] || extInfo.radical+'번';
      result += `  부수: ${rname} (${extInfo.radical}번)\n`;
    }
    if (extInfo.strokes) result += `  획수: ${extInfo.strokes}획\n`;
    if (extInfo.level) result += `  HSK 급수: ${extInfo.level}\n\n`;

    if (extInfo.related && extInfo.related.length) {
      result += `🔗 관련 한자\n  ${extInfo.related.join('  ')}\n\n`;
    }
    result += `━━━━━━━━━━━━━━━━━━━━━━━\n`;
    result += `📝 관련 단어\n\n`;
    result += `[중국어]\n`;
    extInfo.compounds_zh.forEach(w => result += `  • ${w}\n`);
    result += `\n[한국어 한자어]\n`;
    extInfo.compounds_ko.forEach(w => result += `  • ${w}\n`);
    result += `\n`;

    if (extInfo.similar && extInfo.similar.length) {
      result += `⚠️ 혼동 주의 한자\n`;
      extInfo.similar.forEach(s => result += `  • ${s}\n`);
      result += `\n`;
    }
  } else {
    // 확장 DB에 없으면 Unicode 부수 정보 계산
    result += `━━━━━━━━━━━━━━━━━━━━━━━\n`;
    result += `📊 Unicode 분석\n`;
    const radicalInfo = getRadicalByCodepoint(cp);
    if (radicalInfo) result += `  추정 부수: ${radicalInfo}\n`;
    result += `\n💡 더 많은 한자를 분석하려면\n  • MDBG.net — 무료 중한자전\n  • jisho.org — 일영 한자사전\n  • 네이버 한자사전\n`;
  }

  result += `━━━━━━━━━━━━━━━━━━━━━━━\n`;
  result += `💡 완전 무료 · API 비용 없음\n   (Unicode Unihan DB + 내장 확장 DB)`;

  bodyEl.textContent = result;
}

function getUnicodeName(cp) {
  // CJK Unified Ideographs 범위
  if (cp >= 0x4E00 && cp <= 0x9FFF) return 'CJK 통합 한자 (기본)';
  if (cp >= 0x3400 && cp <= 0x4DBF) return 'CJK 통합 한자 확장-A';
  if (cp >= 0x20000 && cp <= 0x2A6DF) return 'CJK 통합 한자 확장-B';
  if (cp >= 0x2E80 && cp <= 0x2EFF) return 'CJK 부수 보충';
  if (cp >= 0x2F00 && cp <= 0x2FDF) return '강희자전 부수 (214개)';
  if (cp >= 0x3040 && cp <= 0x309F) return '히라가나';
  if (cp >= 0x30A0 && cp <= 0x30FF) return '가타카나';
  return null;
}

function getRadicalByCodepoint(cp) {
  // 간단한 범위 기반 부수 추정
  if (cp >= 0x4E00 && cp <= 0x9FFF) {
    return '214 강희자전 부수 중 하나 — jisho.org에서 정확한 부수 확인 가능';
  }
  return null;
}

function selectChar(lang,gi,ci,ch){
  resetSpeakHistory();
  selectedChar={lang,gi,ci,c:ch.c,r:ch.r,m:ch.m||'',t:ch.t||'',speakText:ch.speakText||ch.c};
  repeatCount=0;
  document.getElementById('practiceEmpty').style.display='none';
  document.getElementById('practiceContent').style.display='block';
  document.getElementById('pChar').textContent=ch.c;
  // 연습 패널에서 한글 발음 + 로마자 분리 표시
  const _rFull=ch.r||'';
  const _tFirst=(ch.t||'').split('\n')[0].split('\\n')[0];
  const _koInR=_rFull.match(/^([가-힣\/]+)/);
  const _koInT=_tFirst.match(/^([가-힣\/]+)/);
  const _koRead=_koInR?_koInR[1]:(_koInT?_koInT[1]:'');
  const _romPart=_rFull.replace(/[가-힣\/]+\s*/,'').trim();
  const pRomEl=document.getElementById('pRom');
  if(_koRead){
    pRomEl.innerHTML='<span style="font-size:22px;color:var(--accent3);font-weight:900;display:block">'+_koRead+'</span>'+
      (_romPart?'<span style="font-size:13px;color:var(--text3)">'+_romPart+'</span>':'');
  } else {
    pRomEl.textContent=ch.r;
  }
  document.getElementById('pMeaning').textContent=ch.m||'';
  document.getElementById('pTip').textContent=ch.t||'';
  document.getElementById('feedbackMsg').textContent='';
  document.getElementById('ttsNotice').style.display='none';

  // PT 버튼 표시 (kanji/word/tip 제외한 알파벳 탭)
  const ptBtn = document.getElementById('alphaPtBtn');
  const ptExclude = ['word','kanji','tip'];
  if(ptBtn){
    const showPt = !ptExclude.includes(lang) && ch.c && ch.speakText;
    ptBtn.style.display = showPt ? 'block' : 'none';
  }

  // 말하기 버튼 상태 설정
  const speakBtn=document.getElementById('speakBtn');
  const unsupported=['bn','ta','sa'];
  const isMatra = lang==='hi' && /^[\u093E-\u094F\u0902\u0903\u0943]$/.test(ch.c);
  const isRule = isRuleCard(ch.c, lang);
  if(unsupported.includes(lang)){
    speakBtn.disabled=true; speakBtn.style.opacity='0.4'; speakBtn.textContent='🎤 미지원';
  } else if(isMatra){
    speakBtn.disabled=true; speakBtn.style.opacity='0.4'; speakBtn.textContent='🎤 불가';
  } else if(isRule){
    speakBtn.disabled=false; speakBtn.style.opacity='1'; speakBtn.textContent='🎤 예시연습';
  } else {
    speakBtn.disabled=false; speakBtn.style.opacity='1'; speakBtn.textContent='🎤 말하기';
  }

  updateRepeatUI();
  renderContent(lang);
  setTimeout(speakChar,350);
}
function hidePractice(){
  document.getElementById('practiceEmpty').style.display='block';
  document.getElementById('practiceContent').style.display='none';
}
function updateRepeatUI(){
  let dots='';
  for(let i=0;i<30;i++){const cls=i<repeatCount?'done':i===repeatCount?'current':'';dots+='<div class="dot '+cls+'"></div>';}
  document.getElementById('repeatDots').innerHTML=dots;
  document.getElementById('repeatCount').textContent=repeatCount+'/30';
  const btn=document.getElementById('nextBtn');
  if(repeatCount>=30){btn.textContent='🏆 마스터!';btn.onclick=completeMastery;}
  else{btn.textContent='✓ 완료';btn.onclick=countRepeat;}
}
let _repTarget=30; // 반복 목표 횟수
function setRepeatTarget(n){
  _repTarget=n;
  document.querySelectorAll('.rep-btn').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.rep)===n);
  });
  repeatCount=0; updateRepeatUI();
  showToast('목표: '+n+'회');
}
function updateRepeatTarget(n){ _repTarget=n; }

function countRepeat(){
  if(!selectedChar||repeatCount>=_repTarget)return;
  repeatCount++;updateRepeatUI();
  const mid=Math.floor(_repTarget/3);
  if(repeatCount===mid) showToast('🔥 '+mid+'회!');
  else if(repeatCount===mid*2) showToast('💪 '+mid*2+'회!');
  else if(repeatCount===_repTarget) showToast('🎉 '+_repTarget+'회! 마스터 버튼!');
  speakChar();
}
function completeMastery(){
  if(!selectedChar)return;
  const key=selectedChar.lang+':'+selectedChar.gi+':'+selectedChar.ci;
  masteredChars[key]=true;
  try{localStorage.setItem('mc',JSON.stringify(masteredChars));}catch(e){}
  document.getElementById('modalTitle').textContent='🏆 '+selectedChar.c+' 마스터!';
  document.getElementById('modalText').textContent='"'+selectedChar.c+'" 30회 완료! 다음 글자로!';
  document.getElementById('modal').classList.add('show');
  const tmp=selectedChar.lang;selectedChar=null;repeatCount=0;hidePractice();renderContent(tmp);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

function getVoice(lc){const vs=window.speechSynthesis.getVoices();if(!vs.length)return null;return vs.find(v=>v.lang===lc)||vs.find(v=>v.lang.startsWith(lc.split('-')[0]))||null;}
function speakTextDirect(text,lc,rate,fallbackText){
  window.speechSynthesis.cancel();
  const go=()=>{
    const vs=window.speechSynthesis.getVoices();
    let voice=getVoice(lc), useLang=lc, useText=text;
    // zh-CN 없으면 병음(fallbackText)을 ko-KR이나 en-US로
    if(!voice && fallbackText){
      voice=getVoice('ko-KR')||getVoice('en-US')||(vs[0]||null);
      useLang=getVoice('ko-KR')?'ko-KR':'en-US';
      useText=fallbackText;
    }
    const utt=new SpeechSynthesisUtterance(useText);
    utt.lang=useLang; utt.rate=rate||0.7; utt.pitch=1; utt.volume=1;
    if(voice)utt.voice=voice;
    window.speechSynthesis.speak(utt);
  };
  if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;go();};}else go();
}
function speakChar(){
  if(!selectedChar)return;
  const lo=LANGS.find(l=>l.id===selectedChar.lang);
  const pl=lo?lo.ttsLang:'ko-KR',fl=lo?(lo.fallbackLang||null):null,rate=lo?lo.ttsRate:0.75;
  window.speechSynthesis.cancel();
  // r 필드에서 읽을 수 있는 로마자만 추출
  const getRoman=()=>{
    const r=selectedChar.r||'';
    // 대괄호/소괄호 제거, 첫 단어 or 슬래시 앞 부분
    return r.replace(/\s*\[[^\]]*\]/g,'').replace(/\s*\([^)]*\)/g,'')
            .split('/')[0].split(' ')[0].trim();
  };
  const trySpeak=()=>{
    const vs=window.speechSynthesis.getVoices();
    let voice=getVoice(pl),lang=pl,text=selectedChar.speakText||selectedChar.c,notice=null;
    // 1단계: 해당 언어 음성 있으면 그대로 사용
    if(voice){
      // 정상 경로
    }
    // 2단계: fallback 언어(hi-IN) 시도
    else if(fl&&getVoice(fl)){
      voice=getVoice(fl);lang=fl;
      // hi-IN은 데바나가리를 읽을 수 있음 (힌디/산스크리트/일부 벵골)
      // 벵골/타밀은 hi-IN도 못 읽으므로 로마자로 폴백
      const roman=getRoman();
      text=roman||selectedChar.c;
      notice='🔊 '+(lo?lo.name:'')+' — 로마자 발음: '+text;
    }
    // 3단계: ko-KR 시도
    else if(getVoice('ko-KR')){
      voice=getVoice('ko-KR');lang='ko-KR';
      text=getRoman()||selectedChar.c;
      notice='🔊 로마자 발음: '+text;
    }
    // 4단계: en-US 또는 첫 번째 음성
    else if(vs.length>0){
      voice=getVoice('en-US')||vs[0];
      lang='en-US';
      text=getRoman()||selectedChar.c;
      notice='🔊 로마자 발음: '+text;
    }
    const ne=document.getElementById('ttsNotice');
    if(notice){ne.style.display='block';ne.textContent=notice;}else ne.style.display='none';
    const utt=new SpeechSynthesisUtterance(text);utt.lang=lang;utt.rate=rate;utt.pitch=1;utt.volume=1;
    if(voice)utt.voice=voice;
    utt.onstart=()=>setFeedback('🔊 발음 중...',false);
    utt.onend=()=>{const f=document.getElementById('feedbackMsg');if(f&&f.textContent==='🔊 발음 중...')f.textContent='';};
    utt.onerror=e=>{if(e.error!=='interrupted')setFeedback('TTS 오류: '+e.error,true);};
    window.speechSynthesis.speak(utt);
  };
  if(!window.speechSynthesis.getVoices().length){window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;trySpeak();};}else trySpeak();
}

// 히라가나 ↔ 가타카나 상호 변환
function toHiragana(s){return s.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
function toKatakana(s){return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));}

// 성조 제거 (중국어 병음 정규화)
function stripTones(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').normalize('NFC')
    .replace(/[āáǎàɑ]/g,'a').replace(/[ēéěèê]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u');
}

// 카드 타입 판별: 규칙카드(2자 이상 라틴+기호 조합) vs 단일문자 카드
function isRuleCard(ch, lang){
  // 발음 규칙 설명 카드들 (말하기 판정 대신 예시단어 사용)
  const rulePatterns = {
    cn: /^(zh|ch|sh|ng|au|ei|ao|ou|ia|ie|ua|uo|üe|ui|iu|iao|er|uai|ueng|an|en|in|un|ün|ang|eng|ing|ong|ian|uan|üan|iang|uang|iong|mā|má|mǎ|mà|ma)$/,
    de: /^(ie|ei|eu|äu|au|aa|oo|ee|ch|sch|tsch|pf|sp|st|qu|ng|nk|ck|dt\/tt|-ig|b→p|d→t|g→k|v→f|w→v)$/,
    fr: /^(au|eau|ou|eu|œu|ai|ei|oi|ui|ié|ia|ch|ph|gn|qu|gu|th|ss|tion|ille|ill|an|in|on|un|œ|æ)$/,
    tip: /./,  // 암기전략 탭 전체
  };
  if(rulePatterns[lang] && rulePatterns[lang].test(ch)) return true;
  // 화살표 포함 카드 (b→p 등)
  if(ch.includes('→') || ch.includes('/')) return true;
  // 마트라 단독 (힌디어 모음부호 — 단독 발음 불가)
  if(lang==='hi' && /^[\u093E-\u094F\u0902\u0903]$/.test(ch)) return true;
  return false;
}


// ── 말하기 버튼 상태 제어 ─────────────────────────────
function setSpeakBtn(state){
  const btn = document.getElementById('speakBtn');
  if(!btn) return;
  if(state==='recording'){
    btn.classList.add('recording');
    btn.textContent='⏹ 중지';
  } else {
    btn.classList.remove('recording');
    btn.textContent='🎤 말하기';
  }
}

function toggleSpeak(){
  if(isRecording) stopRecognition();
  else startRecognition();
}

function startRecognition(){
  if(!selectedChar) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ setFeedback('음성인식 미지원 — Chrome/Edge를 사용해주세요',true); return; }
  if(location.protocol==='file:'){
    setFeedback('⚠️ 로컬 파일에서는 마이크가 차단됩니다\nHTTPS(Netlify/GitHub Pages)에 올려서 사용하세요', true);
    return;
  }

  const lang = selectedChar.lang;
  const lo   = LANGS.find(l=>l.id===lang);
  const ch   = selectedChar.c;
  const rom  = selectedChar.r;

  // 규칙카드 처리
  if(isRuleCard(ch, lang)){
    const tip = selectedChar.t||'';
    const exMatch = tip.match(/예[:\s][\s]?([^\n(]+)/);
    const ex = exMatch ? exMatch[1].trim().split('(')[0].trim() : null;
    if(ex){ setFeedback('📖 예시 단어 "'+ex+'"를 말해보세요!', false); speakTextDirect(ex, lo?lo.ttsLang:'ko-KR', 0.7); }
    else   { setFeedback('💡 이 카드는 발음 규칙 카드입니다 — 듣기로 연습하세요', false); }
    return;
  }

  // 마트라 카드
  if(lang==='hi' && /^[\u093E-\u094F\u0902\u0903\u0943]$/.test(ch)){
    setFeedback('💡 모음 부호는 단독 발음 불가 — 자음에 붙여 사용합니다', false);
    return;
  }

  // 음성인식 미지원 언어
  const unsupportedLangs = ['ta','sa'];
  if(unsupportedLangs.includes(lang)){
    const names={ta:'타밀어',sa:'산스크리트'};
    setFeedback('⚠️ '+names[lang]+' 음성인식 미지원 — 듣기로 연습하세요', true);
    return;
  }

  // 인식 언어 결정
  let recogLang = lo ? lo.ttsLang : 'ko-KR';
  if(lang==='cn') recogLang='zh-CN';
  if(lang==='bn') recogLang='bn-IN';

  recognition = new SR();
  recognition.lang = recogLang;
  recognition.interimResults = false;
  recognition.maxAlternatives = 8;

  recognition.onstart = ()=>{
    isRecording=true;
    setSpeakBtn('recording');
    const rRaw = (selectedChar.r||'');
    const rHint = rRaw.replace(/[가-힣\/\s]+/g,'').replace(/[\[（(][^\]）)]*[\]）)]/g,'').trim().split(' ')[0];
    let hint;
    if(lang==='cn')      hint='"'+ch+'" → '+rHint+' 발음으로 말하세요 (성조 없어도 OK)';
    else if(lang==='jp') hint='"'+ch+'" → '+rHint+' 로 읽어보세요';
    else if(lang==='hi') hint='"'+ch+'" → '+rHint+' 발음으로 말하세요';
    else if(lang==='la') hint='"'+ch+'" → '+rHint+' (라틴어 발음)';
    else if(lang==='fr'||lang==='de') hint='"'+ch+'" → '+rHint+' 발음으로';
    else hint='"'+(rHint||ch)+'" 발음해보세요';
    setFeedback('🎤 '+hint, false);
  };

  recognition.onresult = e=>{
    const results = Array.from(e.results[0]).map(x=>x.transcript.trim());
    const said = results[0]||'';
    if(!said) return;

    const ok = checkMatch(results, ch, rom, lang);

    // 비라틴 문자는 로마자로 비교
    const speakTarget = selectedChar.speakText||ch;
    const rRaw2 = (selectedChar.r||'');
    const rClean = rRaw2.replace(/[가-힣\/\s]+/g,'').replace(/[\[（(][^\]）)]*[\]）)]/g,'').trim().split(' ')[0] || speakTarget;
    const isNonLatin = /[^\u0000-\u007F]/.test(speakTarget) && !/[a-zA-Z]/.test(speakTarget);
    const compareTarget = isNonLatin ? rClean : speakTarget;
    const detail = calcPronDetail(compareTarget, said, lo?lo.ttsLang:'ko-KR');
    const {html, cls} = makePronFeedback(detail, speakTarget, said, _speakAutoRound+1, _repTarget);

    const fbArea = document.getElementById('alphaSpeakFeedback');
    if(fbArea){ fbArea.className='speak-feedback show '+cls; fbArea.innerHTML=html; }

    addSpeakHistory(said, detail.score, detail.grade, lang, speakTarget);
    _speakAutoRound++;

    if(ok || detail.score>=70){
      setFeedback('', false);
      countRepeat();
    } else {
      let hint='';
      if(lang==='jp')            hint=' — 히라가나/가타카나 모두 OK';
      else if(lang==='cn')       hint=' — 성조 없이도 OK';
      else if(lang==='de'||lang==='fr') hint=' — 대소문자 무관';
      setFeedback('인식: "'+said+'"'+hint, true);
    }
    stopRecognition();

    // 연속 모드
    if(_speakMode==='repeat' && _speakAutoRound < _repTarget){
      setTimeout(()=>{ if(selectedChar) startRecognition(); }, 1200);
    } else if(_speakMode==='repeat' && _speakAutoRound >= _repTarget){
      const avg = Math.round(_speakHistory.reduce((s,x)=>s+x.score,0)/_speakHistory.length);
      const grade = avg>=85?'상':avg>=60?'중':'하';
      setFeedback('🏁 '+_repTarget+'회 완료! 평균 '+avg+'점 ('+grade+')', false);
      _speakAutoRound = 0;
    }
  };

  recognition.onerror = e=>{
    const msgs={
      no_speech:'소리가 감지되지 않았습니다 — 더 크게 말해보세요',
      not_allowed:'🔒 마이크 권한 필요 — 브라우저 주소창 왼쪽 아이콘 → 마이크 허용 → 새로고침',
      not_found:'🎙️ 마이크를 찾을 수 없습니다',
      audio_capture:'🎙️ 마이크를 찾을 수 없습니다',
      network:'네트워크 오류 — 인터넷 연결 확인',
      service_not_allowed:'⚠️ HTTPS 환경에서 사용하세요',
      language_not_supported:'선택된 언어가 이 기기에서 지원되지 않습니다'
    };
    setFeedback(msgs[e.error]||('오류: '+e.error), true);
    stopRecognition();
  };

  recognition.onend = ()=>{
    if(isRecording){
      stopRecognition();
      const fb = document.getElementById('feedbackMsg');
      if(fb && !fb.textContent){
        setFeedback('소리가 감지되지 않았습니다 — 더 크게 말해보세요', true);
      }
    }
  };

  try{ recognition.start(); }
  catch(e){ setFeedback('마이크 시작 오류: '+e.message+' — 다시 시도해주세요', true); }
}

function stopRecognition(){
  isRecording=false;
  if(recognition){try{recognition.stop();}catch(e){} recognition=null;}
  setSpeakBtn('normal');
  stopFreqAnalysis();
}

// ── 반복 횟수 관리 ──────────────────────────────────
function countRepeat(){
  repeatCount++;
  const dots=document.getElementById('repeatDots');
  const cnt=document.getElementById('repeatCount');
  if(dots){
    const filled=Math.min(repeatCount,_repTarget);
    let html='';
    for(let i=0;i<_repTarget;i++){
      html+='<span class="dot '+(i<filled?'filled':'')+'"></span>';
    }
    dots.innerHTML=html;
  }
  if(cnt) cnt.textContent=repeatCount+'/'+_repTarget;
}

function setRepeatTarget(n){
  _repTarget=n;
  repeatCount=0;
  document.querySelectorAll('.rep-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.rep)===n));
  const dots=document.getElementById('repeatDots');
  const cnt=document.getElementById('repeatCount');
  if(dots) dots.innerHTML='';
  if(cnt) cnt.textContent='0/'+n;
}

function getRepeatCount(cardId){
  const active=document.querySelector('.rep-btn.active[data-card="'+cardId+'"]');
  return active ? parseInt(active.dataset.rep) : _repTarget;
}

// ── 반복 듣기 ────────────────────────────────────────
function startRepeatListen(btn){
  if(!btn) return;
  const text=btn.dataset.text, tts=btn.dataset.tts, card=btn.dataset.card;
  const total=getRepeatCount(card);
  let count=0;
  btn.textContent='⏹ 중지'; btn.classList.add('recording');
  let stopped=false;
  btn.onclick=()=>{ stopped=true; btn.textContent='🔊 듣기'; btn.classList.remove('recording'); btn.onclick=()=>startRepeatListen(btn); };
  const play=()=>{
    if(stopped||count>=total){ if(!stopped){btn.textContent='🔊 듣기';btn.classList.remove('recording');btn.onclick=()=>startRepeatListen(btn);} return; }
    count++;
    const prog=document.getElementById('rp_'+card);
    if(prog) prog.textContent=count+'/'+total;
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang=tts; utt.rate=0.85; utt.volume=1.0;
    const vs=window.speechSynthesis.getVoices();
    const voice=vs.find(v=>v.lang===tts)||vs.find(v=>v.lang.startsWith(tts.split('-')[0]))||vs[0];
    if(voice) utt.voice=voice;
    utt.onend=()=>{ if(!stopped) setTimeout(play,600); };
    window.speechSynthesis.speak(utt);
  };
  play();
}

// ── 반복 말하기 ──────────────────────────────────────
function startRepeatSpeak(btn){
  const btnId=btn.id, text=btn.dataset.text, tts=btn.dataset.tts, card=btn.dataset.card;
  if(_rspActive&&_rspBtnId===btnId){ stopRepeatSpeak(); return; }
  if(_rspActive) stopRepeatSpeak();

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('음성인식 미지원 — Chrome 권장'); return; }
  if(location.protocol==='file:'){ showToast('⚠️ Netlify에 올려서 사용하세요'); return; }

  _rspTotal=getRepeatCount(card);
  _rspCount=0; _rspScores=[]; _rspBtnId=btnId; _rspActive=true;
  btn.classList.add('recording'); btn.textContent='⏹ 중지';

  const fbEl=document.getElementById('sf_'+card);
  if(fbEl){ fbEl.className='speak-feedback show sfb-ok'; fbEl.innerHTML='🎤 말하기 준비 중...'; }

  // 주파수 패널 추가
  const cardEl=btn.closest('.wlang-card,.wlang-sentence');
  if(cardEl&&cardEl.id){ addFreqPanel(cardEl.id,tts); startFreqAnalysis(cardEl.id,tts); }

  const doListen=()=>{
    if(!_rspActive||_rspCount>=_rspTotal){ finishRepeatSpeak(card,text); return; }
    const prog=document.getElementById('rp_'+card);
    if(prog) prog.textContent=(_rspCount+1)+'/'+_rspTotal;

    _rspRec=new SR();
    _rspRec.lang=tts; _rspRec.interimResults=false; _rspRec.maxAlternatives=8;

    let _gotResult=false;
    _rspRec.onresult=e=>{
      _gotResult=true;
      const results=Array.from(e.results[0]).map(x=>x.transcript.trim());
      const best=results[0]||'';
      if(!best){ setTimeout(doListen,400); return; }

      // 비라틴 처리
      const isNL=/[^\u0000-\u007F]/.test(text)&&!/[a-zA-Z]/.test(text);
      const compareText=isNL?(text):text;
      const detail=calcPronDetail(compareText,best,tts);
      _rspScores.push({round:_rspCount+1,said:best,score:detail.score,detail});
      _rspCount++;

      const fbEl2=document.getElementById('sf_'+card);
      if(fbEl2){
        const {html,cls}=makePronFeedback(detail,text,best,_rspCount,_rspTotal);
        fbEl2.className='speak-feedback show '+cls;
        fbEl2.innerHTML=html;
      }
      setTimeout(doListen,800);
    };
    _rspRec.onerror=e=>{
      if(e.error==='no-speech'){ setTimeout(doListen,500); }
      else stopRepeatSpeak();
    };
    _rspRec.onend=()=>{
      if(!_gotResult&&_rspActive) setTimeout(doListen,400);
    };
    _rspRec.start();
  };

  doListen();
}

function stopRepeatSpeak(){
  _rspActive=false;
  if(_rspRec){try{_rspRec.stop();}catch(e){}_rspRec=null;}
  if(_rspBtnId){
    const b=document.getElementById(_rspBtnId);
    if(b){b.classList.remove('recording');b.textContent='🎤 말하기';}
    _rspBtnId=null;
  }
  stopFreqAnalysis();
}


// 언어별 인식결과 정규화 + 비교 함수
function checkMatch(results, char, rom, lang){
  const c = char.trim();
  const r = (rom||'').toLowerCase().trim();
  const rClean = r.replace(/[가-힣\/\s]+/g,'').replace(/[\[（(][^\]）)]*[\]）)]/g,'').trim().split(' ')[0];

  for(let raw of results){
    const t = raw.trim();
    if(!t) continue;

    // 1) 완전 일치
    if(t === c) return true;
    if(t.toLowerCase() === c.toLowerCase()) return true;

    // 2) 언어별 스마트 비교
    const tl = t.toLowerCase();
    switch(lang){
      case 'jp':{
        if(toHiragana(t)===toHiragana(c)) return true;
        if(toKatakana(t)===toKatakana(c)) return true;
        if(t.includes(c)||toHiragana(t).includes(toHiragana(c))) return true;
        if(rClean && (tl===rClean || tl.includes(rClean) || editDist(tl,rClean)<=1)) return true;
        break;
      }
      case 'cn':{
        const tc=stripTones(tl), rc=stripTones(rClean||r);
        if(tc===rc||tc.includes(rc)||rc.includes(tc)) return true;
        if(t.includes(c)||c.includes(t)) return true;
        if(rClean && editDist(tc,rc)<=1) return true;
        break;
      }
      case 'kanji':{
        if(t.includes(c)) return true;
        if(rClean && tl.includes(rClean.split('/')[0])) return true;
        break;
      }
      case 'en':{
        const cl=c.toLowerCase();
        if(tl===cl||tl.includes(cl)||cl.includes(tl)) return true;
        if(rClean && editDist(tl,rClean)<=1) return true;
        break;
      }
      case 'de':
      case 'fr':{
        const cl=c.toLowerCase();
        if(tl===cl||tl.includes(cl)) return true;
        if(rClean && (tl.includes(rClean)||editDist(tl,rClean)<=1)) return true;
        break;
      }
      case 'hi':
      case 'sa':{
        if(t.includes(c)||c.includes(t)) return true;
        if(rClean && (tl.includes(rClean)||editDist(tl,rClean)<=1)) return true;
        break;
      }
      case 'la':{
        const cl=c.toLowerCase();
        if(tl===cl||tl.includes(cl)||editDist(tl,cl)<=1) return true;
        if(rClean && editDist(tl,rClean)<=1) return true;
        break;
      }
      default:{
        if(t.includes(c)||c.includes(t)) return true;
        if(rClean && (tl.includes(rClean)||editDist(tl,rClean)<=1)) return true;
      }
    }
  }
  return false;
}


function calcPronDetail(original, said, lang){
  if(!said || !said.trim())
    return {score:0, grade:'하', accuracy:0, fluency:0, completeness:0, missing:[], extra:[], reason:'음성 미인식'};

  const clean = s => s.replace(/[\s。、.,!?！？「」『』【】\u3000]/g,'').toLowerCase();

  // ── 언어별 정규화 및 대조 대상 결정 ──────────────
  // 음성인식은 항상 로마자/한글/해당 언어 문자로 옴
  // → 원문이 비라틴(あ,ক,क...)이면 로마자 발음(r 필드)으로 비교

  let orig = clean(original);
  let s    = clean(said);

  // 히라가나/가타카나 정규화
  if(lang==='ja-JP'){
    orig = toHiragana(orig);
    s    = toHiragana(s);
  }
  // 중국어 성조 제거
  if(lang==='zh-CN'){
    orig = stripTones(orig);
    s    = stripTones(s);
  }

  // ── 한글 인식 → 영어 변환 테이블 ──────────────────
  const KO_TO_LANG = {
    '밸류':'value','벨류':'value','발류':'value','러브':'love',
    '타임':'time','하우스':'house','스쿨':'school','워터':'water',
    '프렌드':'friend','패밀리':'family','해피':'happy','뷰티풀':'beautiful',
    '월드':'world','피플':'people','스카이':'sky','나이트':'night',
    '데이':'day','북':'book','캣':'cat','독':'dog',
    '아':'a','이':'i','우':'u','에':'e','오':'o',
    '카':'ka','키':'ki','쿠':'ku','케':'ke','코':'ko',
    '가':'ga','기':'gi','구':'gu','게':'ge','고':'go',
    '사':'sa','시':'shi','스':'su','세':'se','소':'so',
    '자':'za','지':'ji','즈':'zu','제':'ze','조':'zo',
    '타':'ta','치':'chi','츠':'tsu','테':'te','토':'to',
    '다':'da','나':'na','니':'ni','누':'nu','네':'ne','노':'no',
    '하':'ha','히':'hi','후':'fu','헤':'he','호':'ho',
    '바':'ba','비':'bi','부':'bu','베':'be','보':'bo',
    '파':'pa','피':'pi','푸':'pu','페':'pe','포':'po',
    '마':'ma','미':'mi','무':'mu','메':'me','모':'mo',
    '야':'ya','유':'yu','요':'yo',
    '라':'ra','리':'ri','루':'ru','레':'re','로':'ro',
    '와':'wa','응':'n','앙':'ang','엉':'eng','옹':'ong',
    '아이':'ai','에이':'ei','아오':'ao','오우':'ou','안':'an','언':'en',
    '봉주르':'bonjour','메르시':'merci','나마스테':'namaste','요가':'yoga',
  };

  // 한글 인식된 경우 변환
  if(/[가-힣]/.test(s)){
    const mapped = KO_TO_LANG[s] || KO_TO_LANG[said.trim()];
    if(mapped) s = mapped;
  }

  // ── 즉시 판정 케이스 ────────────────────────────
  if(orig === s)
    return {score:100, grade:'상', accuracy:100, fluency:100, completeness:100, missing:[], extra:[]};

  // 포함 관계
  if(orig.includes(s) || s.includes(orig)){
    const ratio = Math.min(orig.length, s.length) / Math.max(orig.length, s.length);
    const sc = Math.round(82 + ratio*18);
    return {score:sc, grade:sc>=85?'상':'중', accuracy:sc, fluency:sc,
            completeness:Math.round(ratio*100), missing:[], extra:[]};
  }

  // 편집거리 1~2 → 거의 정확
  const dist = editDist(orig, s);
  if(dist <= 1)
    return {score:90, grade:'상', accuracy:90, fluency:90, completeness:90, missing:[], extra:[]};
  if(dist <= 2 && orig.length >= 3)
    return {score:78, grade:'중', accuracy:78, fluency:78, completeness:85, missing:[], extra:[]};

  // ── 문자 단위 정확도 ────────────────────────────
  const oArr=[...orig], sArr=[...s];
  const used=new Array(sArr.length).fill(false);
  let charMatch=0;
  const missing=[], extra=[];
  for(const oc of oArr){
    const fi=sArr.findIndex((sc,i)=>!used[i]&&sc===oc);
    if(fi>=0){charMatch++;used[fi]=true;}
    else missing.push(oc);
  }
  sArr.forEach((sc,i)=>{ if(!used[i]) extra.push(sc); });
  const accuracy = orig.length>0 ? Math.round(charMatch/orig.length*100) : 0;

  // ── 완성도 ──────────────────────────────────────
  const completeness = orig.length>0
    ? Math.min(100, Math.round(s.length/orig.length*100)) : 0;

  // ── 유창성 ──────────────────────────────────────
  const oWords=orig.split(/\s+/).filter(Boolean);
  const sWords=s.split(/\s+/).filter(Boolean);
  let fluency;
  if(oWords.length <= 1){
    fluency = Math.round((accuracy + Math.min(100, completeness))/2);
  } else {
    let wm=0;
    for(const ow of oWords)
      if(sWords.some(sw=>sw.includes(ow)||ow.includes(sw)||editDist(ow,sw)<=1)) wm++;
    fluency = Math.round(wm/oWords.length*100);
  }

  // ── 종합 ────────────────────────────────────────
  const score = Math.round(accuracy*0.5 + completeness*0.25 + fluency*0.25);
  const grade = score>=85?'상':score>=60?'중':'하';
  return {score, grade, accuracy, fluency, completeness, missing, extra};
}


// 편집 거리 (Levenshtein) — 발음 유사도 보조
function editDist(a, b){
  if(a===b) return 0;
  if(!a.length) return b.length;
  if(!b.length) return a.length;
  const dp=Array.from({length:a.length+1},(_,i)=>
    Array.from({length:b.length+1},(_,j)=>i||j));
  for(let i=1;i<=a.length;i++)
    for(let j=1;j<=b.length;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:
        1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}


function calcPronScore(original, said, lang){
  return calcPronDetail(original, said, lang).score;
}

// 상중하 피드백 HTML 생성
function makePronFeedback(detail, target, said, round, total){
  const {score,grade,accuracy,fluency,completeness,missing,extra} = detail;
  const gradeEmoji = grade==='상'?'🟢':grade==='중'?'🟡':'🔴';
  const gradeText = grade==='상'?'훌륭해요!':grade==='중'?'조금 더 연습하세요':'다시 도전하세요';
  const cls = grade==='상'?'sfb-good':grade==='중'?'sfb-ok':'sfb-bad';
  const barColor = grade==='상'?'#10b981':grade==='중'?'#f59e0b':'#ef4444';

  const makeBar = (label, val) =>
    '<div class="pron-bar-wrap">'+
    '<span class="pron-bar-label">'+label+'</span>'+
    '<div class="pron-bar"><div class="pron-bar-fill" style="width:'+val+'%;background:'+barColor+'"></div></div>'+
    '<span style="font-size:9px;color:var(--text3);width:28px;text-align:right">'+val+'%</span>'+
    '</div>';

  let feedback = '';
  // 헤더
  feedback += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
    '<span class="pron-grade '+grade+'">'+gradeEmoji+' '+grade+'</span>'+
    '<span style="font-weight:700;font-size:12px">'+gradeText+'</span>'+
    (total>1?'<span style="margin-left:auto;font-size:10px;color:var(--text3)">'+round+'/'+total+'회</span>':'')+
    '</div>';

  // 점수 바
  feedback += '<div class="pron-detail">'+
    makeBar('정확도', accuracy)+
    makeBar('완성도', completeness)+
    makeBar('유창성', fluency)+
  '</div>';

  // 세부 피드백
  let tips = '';
  if(said) tips += '인식: <b>"'+esc(said)+'"</b><br>';
  if(accuracy < 70) tips += '🔤 목표: <b>'+esc(target)+'</b><br>';
  if(missing.length>0 && missing.length<=5)
    tips += '⚠️ 빠진 소리: <b>'+missing.slice(0,5).join(' ')+'</b><br>';
  if(accuracy>=80 && completeness>=80 && fluency>=80)
    tips += '✅ 발음이 정확합니다!';
  else if(accuracy<50)
    tips += '💡 천천히 또박또박 다시 말해보세요';
  else if(completeness<70)
    tips += '💡 문장을 끝까지 말해보세요';
  else if(fluency<70)
    tips += '💡 단어 순서에 주의하세요';

  if(tips) feedback += '<div style="margin-top:5px;font-size:10px;color:var(--text2)">'+tips+'</div>';
  // 인식된 말 표시 (항상)
  if(said && said.trim()){
    feedback += '<div style="margin-top:4px;font-size:10px;color:var(--text3)">📢 인식됨: "'+esc(said)+'"</div>';
  } else {
    feedback += '<div style="margin-top:4px;font-size:10px;color:var(--accent2)">⚠️ 음성이 인식되지 않았습니다 — 더 크게, 천천히 말해보세요</div>';
  }
  return {html: feedback, cls};
}

function saveApiKey(key){
  try{
    localStorage.setItem('langAppApiKey', btoa(unescape(encodeURIComponent(key))));
  }catch(e){
    try{ localStorage.setItem('langAppApiKey', key); }catch(e2){}
  }
}

function loadApiKey(){
  try{
    const stored = localStorage.getItem('langAppApiKey');
    if(!stored) return '';
    try{ return decodeURIComponent(escape(atob(stored))); }
    catch(e){ return stored; }
  }catch(e){ return ''; }
}

  // 히스토리 저장
  wordHistory = wordHistory.filter(w=>w!==wordSafe);
  wordHistory.push(wordSafe);
  if(wordHistory.length>20) wordHistory=wordHistory.slice(-20);
  try{ localStorage.setItem('wordHistory', JSON.stringify(wordHistory)); }catch(e){}

  // 로컬 파일 차단
  if(location.protocol==='file:'){
    document.getElementById('wordResult').innerHTML=
      '<div style="background:rgba(249,168,37,.1);border:1px solid rgba(249,168,37,.3);border-radius:12px;padding:20px;text-align:center;color:var(--accent4);line-height:2">'+
      '⚠️ <b>로컬 파일에서는 API 연결이 차단됩니다</b><br>'+
      '<span style="font-size:12px;color:var(--text2)">'+
      '<b style="color:var(--accent3)">✅ GitHub Pages (무료 영구)</b><br>'+
