      '3. https://아이디.github.io/저장소명 접속<br>'+
      '</span></div>';
    return;
  }

  const savedKey = loadApiKey();
  if(!savedKey){
    showToast('🔑 먼저 OpenAI API 키를 저장하세요');
    return;
  }

  const resultEl = document.getElementById('wordResult');
  resultEl.innerHTML = '<div class="word-loading">🔄 번역 중...</div>';

  const prompt = `한국어 단어 "${wordSafe}"를 다음 10개 언어로 번역해주세요. 반드시 아래 JSON 형식만 반환하고 다른 텍스트는 없어야 합니다:
{
  "word": "${wordSafe}",
  "languages": [
    {
      "lang": "en",
      "flag": "🇺🇸",
      "name": "영어",
      "word": "번역단어",
      "reading": "한글발음 [IPA]",
      "meaning": "뜻",
      "sentences": [{"original": "예문", "reading": "한글발음", "romanization": "로마자", "meaning": "뜻"}]
    }
  ]
}
10개 언어: en(영어), jp(일본어), cn(중국어), kanji(한자분석), fr(프랑스어), de(독일어), hi(힌디어), bn(벵골어), ta(타밀어), sa(산스크리트).
reading 필드: 한글 발음 필수 포함. sentences: 각 언어 1개, 10단어 이내 일상 문장.`;

function startWordSpeak(btnId,original,ttsLang,type){
  if(_wSpRecording&&_wSpBtnId===btnId){ stopWordSpeak(); return; }
  if(_wSpRecording) stopWordSpeak();

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('음성인식 미지원 — Chrome 권장'); return; }
  if(location.protocol==='file:'){ showToast('⚠️ 로컬 파일에서는 마이크 차단\nNetlify 등에 올려서 사용하세요'); return; }

  const btn=document.getElementById(btnId);
  if(!btn) return;
  _wSpBtnId=btnId; _wSpRecording=true;
  btn.classList.add('recording');
  btn.textContent='⏹ 중지';

  _wSpRec=new SR();
  _wSpRec.lang=ttsLang;
  _wSpRec.interimResults=false;
  _wSpRec.maxAlternatives=8;

  _wSpRec.onresult=e=>{
    const results=Array.from(e.results[0]).map(x=>x.transcript.trim());
    const best=results[0]||'';
    const origClean=original.replace(/[\s。、.,!?！？「」『』]/g,'').toLowerCase();
    const bestClean=best.replace(/[\s。、.,!?！？「」『』]/g,'').toLowerCase();

    // 유사도 계산
    let score=0;
    if(origClean===bestClean) score=1;
    else if(origClean.includes(bestClean)||bestClean.includes(origClean)) score=0.8;
    else {
      let common=0;
      for(const ch of bestClean) if(origClean.includes(ch)) common++;
      score=origClean.length>0?common/origClean.length:0;
    }

    stopWordSpeak();
    const b=document.getElementById(btnId);
    if(!b) return;
    if(score>=0.8){
      b.textContent='✅ 훌륭해요!';
      b.className=b.className.replace('ws-btn-speak','ws-btn-speak ws-score-good').replace('wlang-btn-speak','wlang-btn-speak ws-score-good');
    } else if(score>=0.5){
      b.textContent='🔶 비슷해요';
      b.className=b.className.replace('ws-btn-speak','ws-btn-speak ws-score-ok').replace('wlang-btn-speak','wlang-btn-speak ws-score-ok');
    } else {
      b.textContent='❌ 다시! ("'+best+'")';
      b.className=b.className.replace('ws-btn-speak','ws-btn-speak ws-score-bad').replace('wlang-btn-speak','wlang-btn-speak ws-score-bad');
    }
    setTimeout(()=>{
      const b2=document.getElementById(btnId);
      if(b2){
        b2.classList.remove('recording','ws-score-good','ws-score-ok','ws-score-bad');
        b2.textContent='🎤 '+(type==='word'?'따라 말하기':'말하기');
      }
    },2500);
  };
  _wSpRec.onerror=e=>{
    stopWordSpeak();
    const b=document.getElementById(btnId);
    if(b) b.textContent='🎤 '+(type==='word'?'따라 말하기':'말하기');
  };
  _wSpRec.onend=()=>{ if(_wSpRecording) stopWordSpeak(); };

  // 마이크 권한 요청 후 시작
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia(AUDIO_CONSTRAINTS).then(stream=>{
      stream.getTracks().forEach(t=>t.stop());
      // 주파수 분석 시작 (알파벳 탭)
      const fp = document.getElementById('alphaSpeakFeedback');
      if(fp && selectedChar){
        const lo2=LANGS.find(l=>l.id===selectedChar.lang);
        const ttsL=lo2?lo2.ttsLang:'ko-KR';
        addFreqPanel('alphaSpeakFeedback', ttsL);
        startFreqAnalysis('alphaSpeakFeedback', ttsL);
      }
      _wSpRec.start();
    }).catch(err=>{
      _wSpRecording=false;
      const b=document.getElementById(btnId);
      if(b){ b.classList.remove('recording'); b.textContent='🔒 마이크 권한 필요'; }
      setTimeout(()=>{ const b2=document.getElementById(btnId); if(b2) b2.textContent='🎤 말하기'; },2000);
    });
  } else {
    _wSpRec.start();
  }
}

function stopWordSpeak(){
  _wSpRecording=false;
  if(_wSpRec){try{_wSpRec.stop();}catch(e){}_wSpRec=null;}
  if(_wSpBtnId){
    const b=document.getElementById(_wSpBtnId);
    if(b&&b.textContent==='⏹ 중지'){
      b.classList.remove('recording');
      b.textContent=b.dataset.type==='word'?'🎤 따라 말하기':'🎤 말하기';
    }
    _wSpBtnId=null;
  }
}

function ptQuickTrain(word, meaning, sentence, reading){
  if(!word) return;
  const ipa = reading ? (reading.includes('[')?reading.split('[').slice(1).join('[').replace(']',''):'') : '';
  const entry = {
    w: word, ipa: ipa?'['+ipa+']':'', ko: meaning, stress:0,
    sentence: sentence||('I use the word '+word+'.'),
    sentKo: '', shadow: sentence?sentence.replace(/[.!?,]/g,''):word,
    tips:{stress:'첫 음절 강세 확인',liaison:'앞 단어와 자연스럽게 이어서',intonation:sentence&&sentence.includes('?')?'의문문 → 끝 올림':'평서문 → 끝 내림'},
    fromWordTab:true
  };
  _ptWordBank = [entry, ..._ptWordBank.filter(x=>x.w!==word)].slice(0,20);
  try{localStorage.setItem('ptWordBank',JSON.stringify(_ptWordBank));}catch(e){}
  ptUseWordBank=true; ptWrong=[];
  ptQueue=[entry]; ptCurrent=null; ptStep=0;
  // PT 탭으로 이동
  switchLang('pt');
  showToast('🎯 "'+word+'" 발음 훈련 시작!');
}

function ptSaveToWordBank(parsed, koWord){
  if(!parsed||!parsed.languages) return;
  const enLang = parsed.languages.find(l=>l.lang==='en');
  if(!enLang||!enLang.word) return;

  const sent = enLang.sentences&&enLang.sentences[0] ? enLang.sentences[0].original : '';
  const ipa  = enLang.reading ? '['+enLang.reading.split('[')[1] || enLang.reading+']' : '';

  const entry = {
    w: enLang.word,
    ipa: ipa || '[' + (enLang.reading||'').split('[').slice(1).join('[') || enLang.reading + ']',
    ko: enLang.meaning || koWord,
    stress: 0,
    sentence: sent || 'I know this ' + enLang.word + '.',
    sentKo: sent ? '' : '이 단어를 알아요.',
    shadow: sent ? sent.replace(/[.!?,]/g,'') : enLang.word,
    tips: {
      stress: enLang.word.length > 4 ? '첫 음절을 강하게 발음하세요' : '단음절 — 강하게 발음',
      liaison: '문장에서 앞 단어와 자연스럽게 이어서',
      intonation: sent.includes('?') ? '의문문 → 끝 올림' : '평서문 → 끝 내림'
    },
    fromWordTab: true,
    koWord: koWord
  };

  // 중복 제거 후 저장 (최대 20개)
  _ptWordBank = _ptWordBank.filter(x=>x.w!==entry.w);
  _ptWordBank.unshift(entry);
  if(_ptWordBank.length>20) _ptWordBank=_ptWordBank.slice(0,20);

  // localStorage에 영구 저장
  try{ localStorage.setItem('ptWordBank', JSON.stringify(_ptWordBank)); }catch(e){}
}

function ptLoadWordBank(){
  try{
    const saved = localStorage.getItem('ptWordBank');
    if(saved) _ptWordBank = JSON.parse(saved);
  }catch(e){ _ptWordBank=[]; }
}

function alphaQuickTrain(){
  if(!selectedChar) return;
  const lang = selectedChar.lang;
  const cfg  = ALPHA_PT_CONFIG[lang];
  if(!cfg){ showToast('이 언어는 PT 연동 준비 중입니다'); return; }

  const ch = selectedChar;
  const speakWord = ch.speakText || ch.c;
  // r 필드에서 한글 발음 추출
  const rFull = ch.r||'';
  const koMatch = rFull.match(/^([가-힣\/]+)/);
  const ipa = koMatch ? rFull : ('['+rFull.replace(/[가-힣\/\s]+/g,'').trim()+']');

  // 예문: t 필드에서 추출
  const tText = ch.t||'';
  const exLine = tText.split('\\n').find(l=>l.includes('예:')) || '';
  const exMatch = exLine.match(/예:\s*([^\n(]+)/);
  const sentence = exMatch ? exMatch[1].trim().split('(')[0].trim() : speakWord;

  const entry = {
    w:       speakWord,
    ipa:     ipa,
    ko:      ch.m || cfg.name+' 문자',
    stress:  0,
    sentence: sentence,
    sentKo:  '',
    shadow:  sentence.replace(/[.!?,。、]/g,''),
    tips:    cfg.tips,
    fromAlpha: true,
    lang:    lang,
    ttsLang: cfg.ttsLang,
  };

  // 단어뱅크에 추가
  _ptWordBank = [entry, ..._ptWordBank.filter(x=>x.w!==entry.w)].slice(0,20);
  try{ localStorage.setItem('ptWordBank', JSON.stringify(_ptWordBank)); }catch(e){}

  // PT 탭으로 이동 및 즉시 훈련
  ptUseWordBank = true;
  ptWrong = [];
  ptQueue = [entry];
  ptCurrent = null;
  ptStep = 0;
  switchLang('pt');
  showToast('🎯 '+speakWord+' — '+cfg.name+' 발음 훈련 시작!');
}

function ptSetLevel(lv){
  ptLevel = lv;
  ptUseWordBank = false;
  ptWrong = [];
  renderPronTrainer();
}

function ptSetWordBankMode(){
  if(!_ptWordBank.length){
    showToast('단어장에서 먼저 단어를 검색하세요!');
    return;
  }
  ptUseWordBank = true;
  ptWrong = [];
  renderPronTrainer();
}

function ptInitQueue(){
  let words;
  if(ptUseWordBank && _ptWordBank.length){
    words = _ptWordBank;
    // 단어뱅크 단어는 셔플
  } else {
    words = PT_WORDS[ptLevel] || PT_WORDS[1];
  }
  ptQueue = [...words].sort(()=>Math.random()-.5);
  ptCurrent = null;
  ptStep = 0;
}

function ptNextWord(){
  if(ptQueue.length === 0){
    ptShowComplete();
    return;
  }
  ptCurrent = ptQueue.shift();
  ptStep = 0;
  ptScores = {accuracy:0, stress:0, liaison:0, intonation:0};
  ptListenCount = 0;
  ptShowStep();
}

function ptUpdateStepBar(){
  PT_STEPS.forEach((_,i)=>{
    const el = document.getElementById('ptStep'+i);
    if(!el) return;
    el.className = 'pt-step ' + (i < ptStep ? 'done' : i === ptStep ? 'active' : '');
  });
}

// ── 각 단계 렌더 ──────────────────────────────────────
function ptShowStep(){
  ptUpdateStepBar();
  const w = ptCurrent;
  switch(ptStep){
    case 0: ptShowCard(w); break;
    case 1: ptShowListen(w); break;
    case 2: ptShowRecord(w); break;
    case 3: ptShowScore(w); break;
    case 4: ptShowCorrection(w); break;
    case 5: ptShowShadowing(w); break;
    case 6: ptShowSentence(w); break;
    case 7: ptShowWordReview(w); break;
  }
}

  ptRec = new SR();
  const recLang=(ptCurrent&&ptCurrent.ttsLang)||'en-US';
  ptRec.lang=recLang; ptRec.interimResults=true; ptRec.maxAlternatives=5;

  ptRec.onstart=()=>{

  };

  ptRec.onresult=e=>{
    const said = Array.from(e.results[0]).map(x=>x.transcript.trim())[0]||'';
    const res=document.getElementById('ptRecResult');
    if(res) res.textContent='인식: "'+said+'"';
    if(e.results[0].isFinal){

    if(st) st.textContent='오류: '+e.error+' — 다시 시도하세요';

  // SR 직접 시작 (getUserMedia 미사용 → 마이크 충돌 방지)

// ── 4단계 발음 분석 ──────────────────────────────────
function ptAnalyze(said){
  ptStopRecord();
  const w = ptCurrent;
  // PT: 비라틴 문자면 로마자로 비교
  const ptOrig = w.w;
  const ptIsNonLatin = /[^\u0000-\u007F]/.test(ptOrig) && !/[a-zA-Z]/.test(ptOrig);
  const ptCompare = ptIsNonLatin ? (w.ipa||ptOrig).replace(/[\[\]\/]/g,'').trim() : ptOrig;
  const detail = calcPronDetail(ptCompare, said, (w.ttsLang)||'en-US');

  // 강세 점수 (인식된 발음의 강세 음절 위치 추정)
  const stressScore = calcStressScore(said, w.w, w.stress);
  // 연음 점수 (단어 경계 처리)
  const liaisonScore = calcLiaisonScore(said, w.w);
  // 억양 점수 (문장형 추정)
  const intonationScore = calcIntonationScore(said, w.sentence);

  ptScores = {
    accuracy: detail.score,
    stress: stressScore,
    liaison: liaisonScore,
    intonation: intonationScore
  };

  // 오답 처리
  const avg = Math.round((detail.score+stressScore+liaisonScore+intonationScore)/4);
  if(avg < 70 && !ptWrong.find(x=>x.w===w.w)) ptWrong.push({...w, said, avg});

  ptStep = 3;
  ptShowStep();
}

// 강세 점수
function calcStressScore(said, target, stressIdx){
  if(!said) return 50;
  const sylS = said.toLowerCase().replace(/[^a-z\s]/g,'').split(/[aeiou]+/).filter(Boolean);
  const sylT = target.toLowerCase().split(/[aeiou]+/).filter(Boolean);
  if(sylT.length<=1) return 90; // 단음절
  // 발음된 음절 수가 맞으면 높은 점수
  const lenMatch = Math.abs(sylS.length - sylT.length) <= 1;
  if(said.toLowerCase().includes(target.toLowerCase().slice(0,3))) return lenMatch?88:72;
  return 65;
}

// 연음 점수
function calcLiaisonScore(said, target){
  if(!said) return 50;
  // 연음 패턴: 자음+모음 연결
  const clean = said.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const tClean = target.toLowerCase();
  if(clean.includes(tClean)) return 92;
  if(editDist(clean.replace(/\s/g,''), tClean.replace(/\s/g,'')) <= 2) return 80;
  return 60;
}

// 억양 점수 (문장 타입 기반)
function calcIntonationScore(said, sentence){
  if(!said) return 50;
  // 의문문이면 올림, 평서문이면 내림 (TTS 재현 여부로 추정 불가 → 고정 점수)
  const isQ = sentence.includes('?');
  const baseScore = said.length > 2 ? 75 : 50;
  return baseScore + (isQ ? 5 : 0);
}

function ptStartShadowing(words){
  if(ptShadowTimer) clearTimeout(ptShadowTimer);
  ptShadowIdx = 0;
  const btn = document.getElementById('ptShadowBtn');
  if(btn) btn.disabled=true;

  const playWord = ()=>{
    if(ptShadowIdx >= words.length){
      const st=document.getElementById('ptShadowStatus');
      if(st) st.textContent='✅ 완료! 한 번 더 하려면 다시 시작을 누르세요';
      if(btn){btn.disabled=false;btn.textContent='🔄 다시';}
      return;
    }
    // 이전 단어 done
    if(ptShadowIdx>0){
      const prev=document.getElementById('sw'+(ptShadowIdx-1));
      if(prev){prev.className='pt-shadow-word done';}
    }
    // 현재 단어 current
    const cur=document.getElementById('sw'+ptShadowIdx);
    if(cur){cur.className='pt-shadow-word current';}

    const st=document.getElementById('ptShadowStatus');
    if(st) st.textContent='🎤 "'+words[ptShadowIdx]+'" 동시에 말하세요!';

    // TTS 재생
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(words[ptShadowIdx]);
    utt.lang='en-US'; utt.rate=0.8; utt.pitch=1.0;
    const vs=window.speechSynthesis.getVoices();
    const voice=vs.find(v=>v.lang==='en-US')||vs[0];
    if(voice) utt.voice=voice;
    utt.onend=()=>{
      ptShadowIdx++;
      ptShadowTimer=setTimeout(playWord, 600);
    };
    window.speechSynthesis.speak(utt);
  };
  playWord();
}

function ptRecordSentence(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  const rec=new SR();
  rec.lang='en-US'; rec.maxAlternatives=3;
  const btn=document.getElementById('ptSentRecBtn');
  if(btn){btn.classList.add('recording');btn.textContent='⏹ 중지';}
  rec.onresult=e=>{
    const said=e.results[0][0].transcript;
    const target=ptCurrent.sentence.replace(/\{|\}/g,'');
    const d=calcPronDetail(target,said,'en-US');
    const res=document.getElementById('ptSentResult');
    if(res){
      const g=d.score>=85?'🟢 상':d.score>=65?'🟡 중':'🔴 하';
      res.innerHTML=`인식: "${esc(said)}" — <b>${g} ${d.score}점</b>`;
    }
    if(btn){btn.classList.remove('recording');btn.textContent='🎤 문장 말하기';}
  };
  rec.onerror=()=>{if(btn){btn.classList.remove('recording');btn.textContent='🎤 문장 말하기';}};
  navigator.mediaDevices.getUserMedia(AUDIO_CONSTRAINTS)
    .then(s=>{s.getTracks().forEach(t=>t.stop());rec.start();})
    .catch(()=>{});
}

function ptStartReview(){
  if(!ptWrong.length){ showToast('복습할 단어가 없습니다'); return; }

  ptWrong = [];
  ptNextWord();
}

let _speakMode = 'once';         // 'once' | 'repeat'
let _speakHistory = [];          // {round, said, score, grade}
let _speakAutoRound = 0;

function setSpeakMode(mode){
  _speakMode = mode;
  document.querySelectorAll('.smode-btn').forEach(b=>{
    b.classList.toggle('active', b.id === (mode==='once'?'smodeOnce':'smodeRepeat'));
  });
  const hint = document.getElementById('speakHintTxt');
  if(hint) hint.textContent = mode==='once'
    ? '말하기 버튼 → 발음 인식 → 상중하 평가'
    : '말하기 버튼 → 목표 횟수만큼 자동 연속 인식';
}

// 언어별 발음 교정 팁

      high: ['완벽한 발음입니다!','훌륭해요! 다음 글자로 넘어가세요']
    },
    jp:{
      low: ['일본어는 각 음절을 균등하게 발음해요','히라가나 행 순서로 천천히 연습하세요','あいうえお를 먼저 완벽하게 익히세요'],
      mid: ['조금 더 짧고 명확하게 발음해보세요','장음(ー)과 단음을 구별해서 발음해보세요'],
      high: ['네이티브 수준의 발음입니다!']
    },
    cn:{
      low: ['성조를 먼저 확인하세요 (1성은 높고 평탄)','입술과 혀 위치를 정확히 하세요','병음을 먼저 소리 내어 읽어보세요'],
      mid: ['성조가 조금 흔들렸어요 — 다시!','j/q/x는 혀끝을 아래 앞니에 대세요'],
      high: ['성조까지 완벽합니다!']

      mid: ['거의 완벽해요! 연음(liaison)에 주의하세요','U(뤼) 발음은 입술을 동그랗게 하고 "이"'],

    },
    de:{
      low: ['독일어 ch는 목구멍에서 "흐"로 발음해요','어말 b→p, d→t, g→k 무성화에 주의','움라우트(ä/ö/ü)는 입술 모양이 핵심'],
      mid: ['거의 정확해요! 강세 위치를 확인하세요','r은 목구멍에서 굴려서 발음해요'],
      high: ['Wunderbar! 완벽한 발음입니다!']
    },
    hi:{
      low: ['힌디어는 유기음(kha/gha)과 무기음(ka/ga) 구별이 중요','권설음(ṭa/ḍa)은 혀를 말아올려서 발음','데바나가리는 소리 나는 대로 적어요 — 발음 규칙적!'],
      mid: ['기식음(h) 부분을 더 강하게 내뱉어보세요','나마스테처럼 단어 전체를 발음해보세요'],
      high: ['बहुत अच्छा! 아주 훌륭합니다!']
    },
    la:{
      low: ['라틴어 V는 [w] 발음이에요 (Vita=위타)','C는 항상 [k] — Caesar=카이사르','이중모음 AE=[아이]를 기억하세요'],
      mid: ['거의 정확해요! 장단음에 주의하세요','강세는 뒤에서 두 번째 음절이 기본'],
      high: ['Optime! 완벽한 발음입니다!']

// 이력 추가 및 패널 업데이트
function addSpeakHistory(said, score, grade, lang, ch){
  const round = _speakHistory.length + 1;
  _speakHistory.push({round, said, score, grade});

  const hist = document.getElementById('speakHistory');
  const body = document.getElementById('shBody');
  const summ = document.getElementById('shSummary');
  if(!hist||!body) return;

  hist.classList.add('open');

  const gradeEmoji = grade==='상'?'🟢':grade==='중'?'🟡':'🔴';
  const item = document.createElement('div');
  item.className = 'sh-item';
  item.innerHTML =
    '<span class="sh-round">'+round+'회</span>'+
    '<span class="sh-grade">'+gradeEmoji+'</span>'+
    '<span class="sh-said">"'+esc(said)+'"</span>'+
    '<span class="sh-score">'+score+'점</span>';
  body.appendChild(item);
  body.scrollTop = body.scrollHeight;

  // 교정 팁 표시
  const tip = getPronTip(lang, ch, said, score);
  const tipEl = body.querySelector('.sh-tip');
  if(tipEl) tipEl.textContent = '💡 '+tip;
  else {
    const tipDiv = document.createElement('div');
    tipDiv.className = 'sh-tip';
    tipDiv.textContent = '💡 '+tip;
    body.appendChild(tipDiv);
  }

  // 요약 업데이트
  const avg = Math.round(_speakHistory.reduce((s,x)=>s+x.score,0)/_speakHistory.length);
  const topGrade = avg>=85?'🟢 상':avg>=60?'🟡 중':'🔴 하';
  if(summ) summ.textContent = round+'회 완료 | 평균 '+avg+'점 '+topGrade;
}

// 새 글자 선택 시 이력 초기화
function resetSpeakHistory(){
  _speakHistory = [];
  _speakAutoRound = 0;
  const body = document.getElementById('shBody');
  const summ = document.getElementById('shSummary');
  const hist = document.getElementById('speakHistory');
  if(body) body.innerHTML='';
  if(summ) summ.textContent='말하기 후 기록됩니다';
  if(hist) hist.classList.remove('open');
}

const LANG_FREQ_PROFILE_MAP = {
  'en-US': {f0:[100,200], vowel:[800,1200], cons:[2000,4000], label:'영어'},
  'ja-JP': {f0:[120,180], vowel:[700,1100], cons:[2500,4500], label:'일본어'},
  'zh-CN': {f0:[100,180], vowel:[750,1150], cons:[2000,3500], label:'중국어'},
  'fr-FR': {f0:[110,190], vowel:[700,1200], cons:[2000,4000], label:'프랑스어'},
  'de-DE': {f0:[100,170], vowel:[650,1100], cons:[2000,3800], label:'독일어'},
  'hi-IN': {f0:[130,220], vowel:[750,1200], cons:[2500,4500], label:'힌디어'},
  'ko-KR': {f0:[120,200], vowel:[700,1100], cons:[2000,4000], label:'한국어'},
  'bn-IN': {f0:[120,210], vowel:[720,1150], cons:[2200,4200], label:'벵골어'},
  'ta-IN': {f0:[125,215], vowel:[730,1160], cons:[2300,4300], label:'타밀어'},
};

// LANG_FREQ_PROFILE은 LANG_FREQ_PROFILE_MAP과 동일 (하위 호환)
const LANG_FREQ_PROFILE = LANG_FREQ_PROFILE_MAP;

let _freqAudioCtx  = null;
let _freqAnimId    = null;
let _freqStream    = null;
let _freqAnalyser  = null;
let _freqBuf       = null;

function getAudioCtx(){
  if(!_freqAudioCtx || _freqAudioCtx.state==='closed'){
    _freqAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
  if(_freqAudioCtx.state==='suspended') _freqAudioCtx.resume();
  return _freqAudioCtx;
}

function drawFreqCanvas(canvasId, dataArray, color, profile){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth || 280;
  const H = canvas.height = 48;
  ctx.clearRect(0,0,W,H);

  if(!dataArray){
    ctx.fillStyle = 'rgba(108,99,255,0.15)';
    const t = Date.now()/500;
    for(let i=0;i<W;i+=4){
      const h = Math.sin(i/30+t)*8+10;
      ctx.fillRect(i, H/2-h/2, 3, h);
    }
    return;
  }
  const barW = Math.max(1, W/dataArray.length*2);
  const gradient = ctx.createLinearGradient(0,H,0,0);
  gradient.addColorStop(0, (color||'#6c63ff')+'33');
  gradient.addColorStop(0.7,(color||'#6c63ff')+'aa');
  gradient.addColorStop(1,  (color||'#6c63ff'));
  ctx.fillStyle = gradient;
  for(let i=0;i<dataArray.length && i<W/2;i++){
    const val = dataArray[i]/255;
    const h   = val * H * 0.9;
    ctx.fillRect(i*barW, H-h, barW-1, h);
  }
}

function drawRefFreq(canvasId, profile){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const W = canvas.width = canvas.offsetWidth || 280;
  const H = canvas.height = 48;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!profile) return;
  const gradient = ctx.createLinearGradient(0,H,0,0);
  gradient.addColorStop(0,'#10b98133');
  gradient.addColorStop(1,'#10b981');
  ctx.fillStyle = gradient;
  const bins = 128;
  for(let i=0;i<bins;i++){
    const freq = (i/bins)*8000;
    let amp = 0.05;
    if(freq>=profile.f0[0]  && freq<=profile.f0[1])   amp=0.6+Math.random()*0.2;
    if(freq>=profile.vowel[0]&& freq<=profile.vowel[1]) amp=0.5+Math.random()*0.3;
    if(freq>=profile.cons[0] && freq<=profile.cons[1])  amp=0.3+Math.random()*0.2;
    ctx.fillRect((i/bins)*W, H-amp*H*0.85, W/bins-1, amp*H*0.85);
  }
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='8px sans-serif';
  if(profile.f0)    ctx.fillText('F0',   (profile.f0[0]/8000)*W+2,   H-3);
  if(profile.vowel) ctx.fillText('모음', (profile.vowel[0]/8000)*W+2, H-3);
  if(profile.cons)  ctx.fillText('자음', (profile.cons[0]/8000)*W+2,  H-3);
}

function addFreqPanel(containerId, langCode){
  const cont = document.getElementById(containerId);
  if(!cont || cont.querySelector('.freq-panel')) return;
  const profile = LANG_FREQ_PROFILE[langCode] || LANG_FREQ_PROFILE['en-US'];
  const panelId = 'fp_'+containerId;
  cont.insertAdjacentHTML('beforeend',
    '<div class="freq-panel active" id="'+panelId+'">'+
      '<div class="freq-row">'+
        '<span class="freq-label">🎤 내 목소리</span>'+
        '<div class="freq-canvas-wrap"><canvas id="fc_my_'+containerId+'" class="freq-canvas"></canvas></div>'+
        '<span class="freq-score" id="fs_my_'+containerId+'" style="color:var(--accent)">-</span>'+
      '</div>'+
      '<div class="freq-row">'+
        '<span class="freq-label">🔊 원어민</span>'+
        '<div class="freq-canvas-wrap"><canvas id="fc_ref_'+containerId+'" class="freq-canvas"></canvas></div>'+
        '<span class="freq-score" id="fs_ref_'+containerId+'" style="color:var(--accent3)">기준</span>'+
      '</div>'+
      '<div class="freq-note" id="fn_'+containerId+'">말하기 버튼을 누르면 실시간 분석 시작</div>'+
      '<div id="fq_'+containerId+'"></div>'+
    '</div>'
  );
  drawRefFreq('fc_ref_'+containerId, profile);
}

async function startFreqAnalysis(containerId, langCode){
  stopFreqAnalysis();
  try{
    _freqStream = await navigator.mediaDevices.getUserMedia({audio:true});
    const audioCtx = getAudioCtx();
    const source   = audioCtx.createMediaStreamSource(_freqStream);
    _freqAnalyser  = audioCtx.createAnalyser();
    _freqAnalyser.fftSize = 256;
    _freqAnalyser.smoothingTimeConstant = 0.8;
    source.connect(_freqAnalyser);
    _freqBuf = new Uint8Array(_freqAnalyser.frequencyBinCount);

    const profile  = LANG_FREQ_PROFILE[langCode] || LANG_FREQ_PROFILE['en-US'];
    const noteEl   = document.getElementById('fn_'+containerId);
    const scoreEl  = document.getElementById('fs_my_'+containerId);
    const qualEl   = document.getElementById('fq_'+containerId);

    // 이어폰 감지
    if(qualEl){
      const tracks   = _freqStream.getAudioTracks();
      const settings = tracks[0]?.getSettings() || {};
      const sr       = settings.sampleRate || 0;
      const badge    = sr>=44100
        ? '<span class="audio-quality aq-good">✅ 고품질 마이크</span>'
        : sr>=16000
          ? '<span class="audio-quality aq-ok">⚡ 일반 마이크</span>'
          : '<span class="audio-quality aq-bad">⚠️ 저품질</span>';
      qualEl.innerHTML = badge;
    }

    const draw = ()=>{
      if(!_freqAnalyser) return;
      _freqAnimId = requestAnimationFrame(draw);
      _freqAnalyser.getByteFrequencyData(_freqBuf);
      drawFreqCanvas('fc_my_'+containerId, _freqBuf, '#6c63ff', profile);

      // 볼륨 계산
      const vol = Math.round(_freqBuf.reduce((s,v)=>s+v,0)/_freqBuf.length/255*100);
      if(scoreEl){ scoreEl.textContent=vol+'%'; scoreEl.style.color=vol>30?'var(--accent3)':'var(--accent2)'; }
      if(noteEl){ noteEl.textContent='볼륨: '+vol+'%' + (vol<10?' — 더 크게 말하세요':''); }
    };
    draw();
  }catch(e){
    const noteEl = document.getElementById('fn_'+containerId);
    if(noteEl) noteEl.textContent='마이크 접근 실패: '+e.message;
  }
}

function stopFreqAnalysis(){
  if(_freqAnimId){ cancelAnimationFrame(_freqAnimId); _freqAnimId=null; }
  if(_freqStream){ _freqStream.getTracks().forEach(t=>t.stop()); _freqStream=null; }
  _freqAnalyser=null; _freqBuf=null;
}

function detectAudioQuality(stream){
  const tracks = stream.getAudioTracks();
  if(!tracks.length) return 'bad';
  const settings = tracks[0].getSettings();
  return settings.sampleRate>=44100?'good':settings.sampleRate>=16000?'ok':'bad';
}


function toggleStrategyCard(sid){
  const desc = document.getElementById(sid+'_desc');
  const card = document.getElementById(sid);
  if(!desc||!card) return;
  const isOpen = desc.style.display !== 'none';
  desc.style.display = isOpen ? 'none' : 'block';
  // 제목의 힌트 텍스트 업데이트
  const hint = card.querySelector('.s-title span');
  if(hint) hint.textContent = isOpen ? '탭하여 보기' : '접기';
  // 카드 배경 강조
  card.style.borderColor = isOpen ? 'var(--border)' : 'var(--accent)';
}

// UTILS
function setFeedback(msg,isError){const el=document.getElementById('feedbackMsg');if(!el)return;el.textContent=msg;el.className='feedback-msg'+(isError?' error':'');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
